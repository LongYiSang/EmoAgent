<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>EmoAgent</title>
  <style>
    :root {
      --bg: #f4efe7;
      --panel: rgba(255,255,255,.78);
      --panel-strong: rgba(255,255,255,.92);
      --text: #2f241f;
      --muted: #7e675e;
      --accent: #db6f4d;
      --accent-soft: #f7d7c8;
      --user: #2f241f;
      --assistant: #fff8f3;
      --border: rgba(47,36,31,.12);
      --shadow: 0 20px 45px rgba(88,55,38,.12);
      font-family: "Segoe UI", "PingFang SC", "Hiragino Sans GB", sans-serif;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(219,111,77,.18), transparent 32%),
        radial-gradient(circle at bottom right, rgba(143,182,166,.18), transparent 28%),
        linear-gradient(160deg, #f7f1ea 0%, #efe5d8 100%);
      display: grid;
      place-items: center;
      padding: 24px;
    }
    button,
    textarea {
      font: inherit;
    }
    .shell {
      width: min(1180px, 100%);
      height: min(780px, calc(100vh - 48px));
      background: var(--panel);
      backdrop-filter: blur(18px);
      border: 1px solid var(--border);
      border-radius: 28px;
      box-shadow: var(--shadow);
      display: grid;
      grid-template-columns: 290px minmax(0, 1fr);
      overflow: hidden;
      min-height: 0;
    }
    .sidebar {
      border-right: 1px solid var(--border);
      background: rgba(255,255,255,.58);
      display: grid;
      grid-template-rows: auto auto 1fr;
      min-height: 0;
    }
    .sidebar-head,
    .sidebar-actions {
      padding: 18px;
      border-bottom: 1px solid var(--border);
    }
    .sidebar-head h1 {
      margin: 0;
      font-size: 21px;
      font-weight: 700;
    }
    .sidebar-head p {
      margin: 8px 0 0;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.5;
    }
    .sidebar-actions {
      display: grid;
      gap: 10px;
    }
    .actions-row {
      display: flex;
      gap: 10px;
    }
    .ghost-button,
    .primary-button,
    .session-delete,
    .menu-button {
      border: 1px solid var(--border);
      border-radius: 16px;
      cursor: pointer;
      transition: transform .16s ease, opacity .16s ease, border-color .16s ease;
    }
    .ghost-button,
    .menu-button {
      background: rgba(255,255,255,.88);
      color: var(--text);
    }
    .primary-button {
      background: linear-gradient(135deg, #db6f4d, #c95735);
      color: white;
      border-color: transparent;
    }
    .ghost-button,
    .primary-button,
    .menu-button {
      min-height: 44px;
      padding: 0 14px;
      font-weight: 700;
    }
    .ghost-button:hover,
    .primary-button:hover,
    .session-delete:hover,
    .menu-button:hover {
      transform: translateY(-1px);
    }
    .session-delete {
      width: 34px;
      height: 34px;
      background: rgba(255,255,255,.9);
      color: #b44b3b;
    }
    .menu-button {
      display: none;
      align-items: center;
      justify-content: center;
      width: 44px;
      padding: 0;
    }
    .session-list {
      padding: 16px;
      overflow-y: auto;
      display: grid;
      gap: 10px;
      align-content: start;
    }
    .session-item,
    .session-empty {
      border: 1px solid var(--border);
      border-radius: 20px;
      background: rgba(255,255,255,.78);
    }
    .session-item {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 10px;
      padding: 14px;
      cursor: pointer;
      text-align: left;
      transition: transform .16s ease, border-color .16s ease, background .16s ease;
    }
    .session-item:hover {
      transform: translateY(-1px);
      border-color: rgba(219,111,77,.28);
    }
    .session-item.active {
      border-color: rgba(219,111,77,.35);
      background: linear-gradient(180deg, rgba(255,244,236,.95), rgba(255,255,255,.94));
    }
    .session-main {
      min-width: 0;
      display: grid;
      grid-template-rows: auto minmax(0, 1fr) auto auto;
      min-height: 0;
      height: 100%;
      overflow: hidden;
    }
    .session-title {
      font-size: 14px;
      font-weight: 700;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .session-meta,
    .session-preview,
    .session-empty {
      font-size: 12px;
      color: var(--muted);
      line-height: 1.5;
    }
    .session-preview {
      margin-top: 6px;
      overflow: hidden;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
    }
    .session-empty {
      padding: 18px;
    }
    .chat-header {
      padding: 22px 24px 18px;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
    }
    .chat-header h2 {
      margin: 0;
      font-size: 20px;
      font-weight: 700;
    }
    .sub {
      margin-top: 6px;
      font-size: 13px;
      color: var(--muted);
    }
    .header-tools {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }
    .status {
      padding: 8px 12px;
      border-radius: 999px;
      font-size: 12px;
      background: var(--accent-soft);
      color: var(--accent);
      white-space: nowrap;
    }
    .admin-link {
      display: inline-flex;
      align-items: center;
      padding: 8px 12px;
      border-radius: 999px;
      font-size: 12px;
      color: var(--text);
      background: rgba(255,255,255,.78);
      border: 1px solid var(--border);
      text-decoration: none;
      white-space: nowrap;
    }
    .admin-link:hover {
      border-color: rgba(219,111,77,.28);
    }
    .approval-stack {
      display: none;
      gap: 12px;
      padding: 16px 24px 0;
      overflow-y: auto;
      max-height: 220px;
    }
    .approval-card {
      border: 1px solid rgba(219,111,77,.18);
      background: linear-gradient(180deg, rgba(255,248,243,.96), rgba(255,255,255,.94));
      border-radius: 20px;
      padding: 16px;
      display: grid;
      gap: 12px;
      box-shadow: 0 10px 20px rgba(88,55,38,.06);
    }
    .approval-head {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: flex-start;
    }
    .approval-title {
      font-size: 15px;
      font-weight: 700;
    }
    .approval-meta {
      font-size: 12px;
      color: var(--muted);
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 6px;
    }
    .approval-status {
      display: inline-flex;
      align-items: center;
      padding: 6px 10px;
      border-radius: 999px;
      background: rgba(219,111,77,.12);
      color: var(--accent);
      font-size: 12px;
      font-weight: 700;
      white-space: nowrap;
    }
    .approval-body {
      display: grid;
      gap: 10px;
      font-size: 14px;
      line-height: 1.6;
    }
    .approval-options {
      display: grid;
      gap: 8px;
      margin: 0;
      padding: 0;
      list-style: none;
    }
    .approval-option {
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 10px 12px;
      background: rgba(255,255,255,.82);
    }
    .approval-option strong {
      display: block;
      margin-bottom: 4px;
      font-size: 13px;
    }
    .approval-actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }
    .approval-action {
      min-height: 40px;
      padding: 0 14px;
      border-radius: 14px;
      border: 1px solid var(--border);
      background: rgba(255,255,255,.95);
      color: var(--text);
      cursor: pointer;
      font-weight: 700;
    }
    .approval-action.primary {
      background: linear-gradient(135deg, #db6f4d, #c95735);
      color: white;
      border-color: transparent;
    }
    .approval-action:disabled {
      opacity: .5;
      cursor: default;
    }
    .messages {
      padding: 24px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 14px;
      min-height: 0;
      height: 100%;
      overscroll-behavior: contain;
    }
    .message {
      max-width: min(78%, 680px);
      padding: 14px 16px;
      border-radius: 20px;
      line-height: 1.55;
      white-space: pre-wrap;
      word-break: break-word;
      border: 1px solid transparent;
      animation: rise .2s ease-out;
    }
    .message.user {
      margin-left: auto;
      background: var(--user);
      color: white;
      border-bottom-right-radius: 6px;
    }
    .message.assistant {
      background: var(--assistant);
      border-color: var(--border);
      border-bottom-left-radius: 6px;
    }
    .message.error {
      background: #fff1f0;
      border-color: rgba(176,58,46,.18);
      color: #9d2e1f;
    }
    .message.pending {
      opacity: .86;
      box-shadow: inset 0 0 0 1px rgba(255,255,255,.12);
    }
    .message.failed {
      border-color: rgba(180,75,59,.4);
      box-shadow: inset 0 0 0 1px rgba(180,75,59,.2);
    }
    .message.work-progress {
      font-style: italic;
      opacity: .72;
      border-style: dashed;
      animation: progressPulse 1.4s ease-in-out infinite;
    }
    .message-content {
      white-space: pre-wrap;
    }
    .message-status {
      margin-top: 8px;
      font-size: 12px;
      opacity: .82;
    }
    .message-retry {
      margin-top: 8px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 32px;
      padding: 0 12px;
      border: 1px solid rgba(255,255,255,.24);
      border-radius: 999px;
      background: rgba(255,255,255,.14);
      color: inherit;
      cursor: pointer;
    }
    .message-retry:hover {
      border-color: rgba(255,255,255,.4);
    }
    form {
      padding: 18px 20px 20px;
      border-top: 1px solid var(--border);
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 12px;
      align-items: end;
      background: rgba(255,255,255,.55);
      min-height: 0;
    }
    textarea {
      width: 100%;
      min-height: 56px;
      max-height: 180px;
      resize: vertical;
      border-radius: 18px;
      border: 1px solid var(--border);
      padding: 15px 16px;
      color: inherit;
      background: rgba(255,255,255,.82);
      outline: none;
    }
    textarea:focus {
      border-color: rgba(219,111,77,.45);
      box-shadow: 0 0 0 4px rgba(219,111,77,.12);
    }
    .send-button {
      height: 56px;
      border: 0;
      border-radius: 18px;
      padding: 0 22px;
      font-weight: 700;
      color: white;
      background: linear-gradient(135deg, #db6f4d, #c95735);
      cursor: pointer;
      transition: transform .16s ease, opacity .16s ease;
    }
    .send-button:disabled,
    textarea:disabled,
    .ghost-button:disabled,
    .primary-button:disabled,
    .session-delete:disabled {
      cursor: not-allowed;
      opacity: .65;
      transform: none;
    }
    @keyframes rise {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes progressPulse {
      0% { opacity: .55; }
      50% { opacity: .9; }
      100% { opacity: .55; }
    }
    @media (max-width: 960px) {
      body { padding: 0; }
      .shell {
        width: 100%;
        height: 100vh;
        border-radius: 0;
        grid-template-columns: 1fr;
      }
      .sidebar {
        position: fixed;
        inset: 0 auto 0 0;
        width: min(320px, 86vw);
        z-index: 20;
        transform: translateX(-100%);
        transition: transform .22s ease;
        box-shadow: 18px 0 32px rgba(47,36,31,.12);
      }
      .sidebar.open {
        transform: translateX(0);
      }
      .menu-button {
        display: inline-flex;
      }
    }
    @media (max-width: 720px) {
      .message { max-width: 88%; }
      form { grid-template-columns: 1fr; }
      .send-button { width: 100%; }
      .actions-row {
        display: grid;
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <main class="shell">
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-head">
        <h1>EmoAgent</h1>
        <p id="sidebar-persona">Persona: loading...</p>
      </div>
      <div class="sidebar-actions">
        <div class="actions-row">
          <button class="primary-button" id="new-chat" type="button">+ New Chat</button>
          <button class="ghost-button" id="refresh-sessions" type="button">Refresh</button>
        </div>
      </div>
      <section class="session-list" id="session-list">
        <div class="session-empty">正在加载会话列表...</div>
      </section>
    </aside>

    <section class="session-main">
      <header class="chat-header">
        <div>
          <h2>EmoAgent</h2>
          <div class="sub" id="subtitle">P3 conversation loop</div>
        </div>
        <div class="header-tools">
          <button class="menu-button" id="toggle-sidebar" type="button">≡</button>
          <a class="admin-link" href="/admin.html">Admin</a>
          <div class="status" id="status">Connecting...</div>
        </div>
      </header>
      <section class="messages" id="messages"></section>
      <section class="approval-stack" id="approvals"></section>
      <form id="composer">
        <textarea id="input" placeholder="Enter 输入 Shift+Enter 换行"></textarea>
        <button class="send-button" id="send" type="submit">Send</button>
      </form>
    </section>
  </main>

  <script>
    const statusEl = document.getElementById('status');
    const subtitleEl = document.getElementById('subtitle');
    const sidebarPersonaEl = document.getElementById('sidebar-persona');
    const approvalsEl = document.getElementById('approvals');
    const messagesEl = document.getElementById('messages');
    const sessionListEl = document.getElementById('session-list');
    const sidebarEl = document.getElementById('sidebar');
    const form = document.getElementById('composer');
    const input = document.getElementById('input');
    const send = document.getElementById('send');
    const newChatButton = document.getElementById('new-chat');
    const refreshSessionsButton = document.getElementById('refresh-sessions');
    const toggleSidebarButton = document.getElementById('toggle-sidebar');

    let socket = null;
    let reconnectDelay = 1000;
    let reconnectTimer = null;
    let pendingAssistant = null;
    let sending = false;
    let manuallyClosed = false;
    let wsSkipGreeting = false;
    let connectAttempt = null;
    let currentSessionId = new URLSearchParams(location.search).get('session_id') || '';
    let currentPersonaKey = '';
    let sessionList = [];
    let approvals = [];
    const pendingApprovalActions = new Set();
    let workProgressNode = null;

    function messageField(item, field) {
      if (!item || typeof item !== 'object') {
        return '';
      }
      return item[field] ?? item[field[0].toUpperCase() + field.slice(1)] ?? '';
    }

    function setStatus(text) {
      statusEl.textContent = text;
    }

    function setSending(next) {
      sending = next;
      input.disabled = next;
      send.disabled = next;
      renderApprovals();
      if (!next) {
        input.focus();
      }
    }

    function clearMessages() {
      pendingAssistant = null;
      clearWorkProgress();
      messagesEl.innerHTML = '';
    }

    function appendMessage(role, content) {
      const node = document.createElement('div');
      node.className = `message ${role}`;
      const body = document.createElement('div');
      body.className = 'message-content';
      body.textContent = content;
      node.appendChild(body);
      messagesEl.appendChild(node);
      scrollToBottom();
      return node;
    }

    function setMessageContent(node, content) {
      if (!node) {
        return;
      }
      const body = node.querySelector('.message-content');
      if (body) {
        body.textContent = content;
      } else {
        node.textContent = content;
      }
      scrollToBottom();
    }

    function messageTextOf(node) {
      if (!node) {
        return '';
      }
      return node.dataset.messageContent || node.querySelector('.message-content')?.textContent || '';
    }

    function setLocalUserMessageState(node, state, onRetry) {
      if (!node) {
        return;
      }

      node.classList.toggle('pending', state === 'pending');
      node.classList.toggle('failed', state === 'failed');

      node.querySelector('.message-status')?.remove();
      node.querySelector('.message-retry')?.remove();

      if (state === 'pending' || state === 'failed') {
        const status = document.createElement('div');
        status.className = 'message-status';
        status.textContent = state === 'pending' ? 'Sending...' : 'Send failed';
        node.appendChild(status);
      }

      if (state === 'failed' && typeof onRetry === 'function') {
        const retryButton = document.createElement('button');
        retryButton.className = 'message-retry';
        retryButton.type = 'button';
        retryButton.textContent = 'Retry';
        retryButton.addEventListener('click', () => {
          onRetry();
        });
        node.appendChild(retryButton);
      }
    }

    function appendLocalUserMessage(content) {
      const node = appendMessage('user', content);
      node.dataset.messageContent = content;
      setLocalUserMessageState(node, 'pending');
      return node;
    }

    function renderHistory(messages) {
      clearMessages();
      for (const item of messages || []) {
        const role = messageField(item, 'role') || 'assistant';
        const content = messageField(item, 'content');
        if (content) {
          appendMessage(role, content);
        }
      }
    }

    function approvalField(item, field) {
      if (!item || typeof item !== 'object') {
        return '';
      }
      return item[field] ?? item[field[0].toUpperCase() + field.slice(1)] ?? '';
    }

    function approvalOptionsOf(item) {
      return item?.options || item?.Options || [];
    }

    function approvalIdOf(item) {
      return approvalField(item, 'id');
    }

    function upsertApproval(item) {
      const id = approvalIdOf(item);
      if (!id) {
        return;
      }
      const next = [...approvals];
      const index = next.findIndex((candidate) => approvalIdOf(candidate) === id);
      if (index >= 0) {
        next[index] = item;
      } else {
        next.push(item);
      }
      approvals = next;
      if ((approvalField(item, 'status') || 'pending') !== 'pending') {
        pendingApprovalActions.delete(id);
      }
      renderApprovals();
    }

    function syncPendingApprovalActions() {
      const pendingIDs = new Set();
      for (const item of approvals) {
        const id = approvalIdOf(item);
        if (!id) {
          continue;
        }
        if ((approvalField(item, 'status') || 'pending') === 'pending') {
          pendingIDs.add(id);
        }
      }
      for (const id of pendingApprovalActions) {
        if (!pendingIDs.has(id)) {
          pendingApprovalActions.delete(id);
        }
      }
    }

    async function loadApprovals(sessionID = currentSessionId) {
      if (!sessionID) {
        approvals = [];
        renderApprovals();
        return;
      }
      try {
        const payload = await requestJSON(`/api/sessions/${encodeURIComponent(sessionID)}/approvals`);
        approvals = payload.approvals || [];
      } catch (_) {
        approvals = [];
      }
      syncPendingApprovalActions();
      renderApprovals();
    }

    function renderApprovals() {
      approvalsEl.innerHTML = '';
      if (!currentSessionId || !approvals.length) {
        approvalsEl.style.display = 'none';
        return;
      }
      approvalsEl.style.display = 'grid';

      for (const item of approvals) {
        const approvalID = approvalIdOf(item);
        const status = approvalField(item, 'status') || 'pending';
        const actionPending = approvalID ? pendingApprovalActions.has(approvalID) : false;
        const rejectOptionID = approvalField(item, 'reject_option_id') || approvalField(item, 'rejectOptionID');
        const options = approvalOptionsOf(item);
        const card = document.createElement('article');
        card.className = 'approval-card';

        const header = document.createElement('div');
        header.className = 'approval-head';
        header.innerHTML = `
          <div>
            <div class="approval-title">${approvalField(item, 'goal_summary') || approvalField(item, 'goalSummary') || '需要人工审批'}</div>
            <div class="approval-meta">
              <span>Task: ${approvalField(item, 'task_id') || approvalField(item, 'taskID') || '-'}</span>
              <span>Expires: ${formatSessionTime(approvalField(item, 'expires_at') || approvalField(item, 'expiresAt'))}</span>
            </div>
          </div>
          <span class="approval-status">${status}</span>
        `;
        card.appendChild(header);

        const body = document.createElement('div');
        body.className = 'approval-body';
        body.innerHTML = `<div>${approvalField(item, 'question') || ''}</div>`;
        card.appendChild(body);

        if (options.length) {
          const list = document.createElement('ul');
          list.className = 'approval-options';
          for (const option of options) {
            const selected = (approvalField(item, 'selected_option_id') || approvalField(item, 'selectedOptionID')) === approvalField(option, 'id');
            const row = document.createElement('li');
            row.className = 'approval-option';
            row.innerHTML = `
              <strong>${approvalField(option, 'id')}${selected ? ' · selected' : ''}</strong>
              <span>${approvalField(option, 'summary')}</span>
            `;
            list.appendChild(row);
          }
          card.appendChild(list);
        }

        if (status === 'pending') {
          const actions = document.createElement('div');
          actions.className = 'approval-actions';
          for (const option of options) {
            const optionID = approvalField(option, 'id');
            if (!optionID || optionID === rejectOptionID) {
              continue;
            }
            const button = document.createElement('button');
            button.type = 'button';
            button.className = 'approval-action primary';
            button.disabled = actionPending;
            button.textContent = `批准 ${approvalField(option, 'summary') || optionID}`;
            button.addEventListener('click', async () => {
              await sendApprovalAction(approvalID, 'approve', optionID);
            });
            actions.appendChild(button);
          }
          if (rejectOptionID) {
            const rejectSummary = options.find((option) => approvalField(option, 'id') === rejectOptionID)?.summary || rejectOptionID;
            const button = document.createElement('button');
            button.type = 'button';
            button.className = 'approval-action';
            button.disabled = actionPending;
            button.textContent = `拒绝并选择 ${rejectSummary}`;
            button.addEventListener('click', async () => {
              await sendApprovalAction(approvalID, 'reject', '');
            });
            actions.appendChild(button);
          }
          card.appendChild(actions);
        }

        approvalsEl.appendChild(card);
      }
    }

    function ensureWorkProgressNode() {
      if (workProgressNode && workProgressNode.isConnected) {
        return workProgressNode;
      }
      const node = document.createElement('div');
      node.className = 'message assistant work-progress';
      const body = document.createElement('div');
      body.className = 'message-content';
      node.appendChild(body);
      messagesEl.appendChild(node);
      workProgressNode = node;
      return node;
    }

    function showWorkProgress(text) {
      const content = (text || '').trim();
      if (!content) {
        return;
      }
      const node = ensureWorkProgressNode();
      setMessageContent(node, content);
    }

    function clearWorkProgress() {
      if (workProgressNode && workProgressNode.parentNode) {
        workProgressNode.parentNode.removeChild(workProgressNode);
      }
      workProgressNode = null;
    }

    function scrollToBottom() {
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    function updateSubtitle() {
      subtitleEl.textContent = currentPersonaKey
        ? `Persona: ${currentPersonaKey}`
        : 'P3 conversation loop';
      sidebarPersonaEl.textContent = currentPersonaKey
        ? `Persona: ${currentPersonaKey}`
        : 'Persona: loading...';
    }

    function syncURL() {
      const url = new URL(location.href);
      if (currentPersonaKey) {
        url.searchParams.set('persona', currentPersonaKey);
      } else {
        url.searchParams.delete('persona');
      }
      if (currentSessionId) {
        url.searchParams.set('session_id', currentSessionId);
      } else {
        url.searchParams.delete('session_id');
      }
      history.replaceState({}, '', url);
    }

    function formatSessionTime(raw) {
      if (!raw) {
        return 'Unknown time';
      }
      const date = new Date(raw);
      if (Number.isNaN(date.getTime())) {
        return raw;
      }
      return date.toLocaleString('zh-CN', {
        month: 'short',
        day: 'numeric',
        hour: '2-digit',
        minute: '2-digit',
      });
    }

    function previewText(item) {
      return item.LastMessage || item.last_message || item.lastMessage || 'No messages yet';
    }

    function sessionIdOf(item) {
      return item.ID || item.id || '';
    }

    function sessionPersonaOf(item) {
      return item.Persona || item.persona || '';
    }

    function renderSessionList() {
      sessionListEl.innerHTML = '';
      if (!sessionList.length) {
        sessionListEl.innerHTML = '<div class="session-empty">当前 Persona 还没有非空会话。</div>';
        return;
      }

      for (const item of sessionList) {
        const sessionID = sessionIdOf(item);
        const row = document.createElement('div');
        row.className = `session-item ${sessionID === currentSessionId ? 'active' : ''}`;

        const title = item.Title || item.title || '';
        const main = document.createElement('div');
        main.innerHTML = `
          <div class="session-title">${title || formatSessionTime(item.UpdatedAt || item.updated_at || item.updatedAt)}</div>
          <div class="session-meta">${formatSessionTime(item.UpdatedAt || item.updated_at || item.updatedAt)} · ${(item.MessageCount ?? item.message_count ?? 0)} messages</div>
          <div class="session-preview">${previewText(item)}</div>
        `;

        const deleteButton = document.createElement('button');
        deleteButton.className = 'session-delete';
        deleteButton.type = 'button';
        deleteButton.textContent = '×';
        deleteButton.title = 'Delete session';
        deleteButton.addEventListener('click', async (event) => {
          event.stopPropagation();
          await deleteSession(sessionID);
        });

        row.appendChild(main);
        row.appendChild(deleteButton);
        row.addEventListener('click', async () => {
          if (sessionID && sessionID !== currentSessionId) {
            await switchSession(sessionID, sessionPersonaOf(item) || currentPersonaKey);
          }
        });
        sessionListEl.appendChild(row);
      }
    }

    async function requestJSON(url, options = {}) {
      const response = await fetch(url, {
        credentials: 'same-origin',
        headers: { 'Accept': 'application/json' },
        ...options,
      });
      const payload = await response.json().catch(() => ({}));
      if (!response.ok) {
        throw new Error(payload.error || response.statusText || 'Request failed');
      }
      return payload;
    }

    function wsURL() {
      const protocol = location.protocol === 'https:' ? 'wss:' : 'ws:';
      const url = new URL(`${protocol}//${location.host}/ws`);
      if (currentPersonaKey) {
        url.searchParams.set('persona', currentPersonaKey);
      }
      if (currentSessionId) {
        url.searchParams.set('session_id', currentSessionId);
      }
      if (wsSkipGreeting) {
        url.searchParams.set('skip_greeting', '1');
      }
      return url.toString();
    }

    function rejectConnectAttempt(message) {
      if (!connectAttempt || typeof connectAttempt.reject !== 'function') {
        connectAttempt = null;
        return;
      }
      const { reject } = connectAttempt;
      connectAttempt = null;
      reject(new Error(message || 'Failed to connect'));
    }

    function resolveConnectAttempt() {
      if (!connectAttempt || typeof connectAttempt.resolve !== 'function') {
        connectAttempt = null;
        return;
      }
      const { resolve } = connectAttempt;
      connectAttempt = null;
      resolve();
    }

    async function closeSocket() {
      clearTimeout(reconnectTimer);
      if (!socket || socket.readyState >= WebSocket.CLOSING) {
        socket = null;
        return;
      }
      manuallyClosed = true;
      await new Promise((resolve) => {
        const current = socket;
        current.addEventListener('close', () => resolve(), { once: true });
        current.close();
        setTimeout(resolve, 250);
      });
      socket = null;
    }

    function connect() {
      clearTimeout(reconnectTimer);
      manuallyClosed = false;
      setStatus('Connecting...');
      const currentSocket = new WebSocket(wsURL());
      let handshakeFailed = false;
      socket = currentSocket;
      wsSkipGreeting = false;

      currentSocket.addEventListener('open', () => {
        if (socket !== currentSocket) {
          return;
        }
        reconnectDelay = 1000;
        setStatus('Connected');
      });

      currentSocket.addEventListener('message', async (event) => {
        if (socket !== currentSocket) {
          return;
        }
        const payload = JSON.parse(event.data);
        switch (payload.type) {
          case 'session_ready':
            currentSessionId = payload.session_id || payload.SessionID || currentSessionId;
            currentPersonaKey = payload.persona || payload.Persona || currentPersonaKey;
            syncURL();
            updateSubtitle();
            if (connectAttempt?.awaitingSessionReady) {
              resolveConnectAttempt();
            }
            await loadSessionList();
            await loadApprovals(currentSessionId);
            break;
          case 'greeting':
            appendMessage('assistant', payload.content || '');
            break;
          case 'stream_start':
            pendingAssistant = appendMessage('assistant', '');
            setSending(true);
            break;
          case 'stream_delta':
            if (!pendingAssistant) {
              pendingAssistant = appendMessage('assistant', '');
            }
            setMessageContent(pendingAssistant, `${messageTextOf(pendingAssistant)}${payload.content || ''}`);
            break;
          case 'stream_end':
            pendingAssistant = null;
            clearWorkProgress();
            pendingApprovalActions.clear();
            setSending(false);
            await loadSessionList();
            await loadApprovals(currentSessionId);
            break;
          case 'error':
            appendMessage('error', payload.content || 'Unknown error');
            pendingAssistant = null;
            clearWorkProgress();
            pendingApprovalActions.clear();
            setSending(false);
            await loadSessionList();
            await loadApprovals(currentSessionId);
            break;
          case 'approval_required':
          case 'approval_updated':
            upsertApproval(payload.approval || payload.Approval);
            break;
          case 'work_progress':
            showWorkProgress(payload.content || '');
            break;
          case 'work_progress_end':
            clearWorkProgress();
            break;
          case 'pong':
            break;
        }
      });

      currentSocket.addEventListener('close', () => {
        if (socket !== currentSocket) {
          return;
        }
        pendingAssistant = null;
        clearWorkProgress();
        setSending(false);
        const pendingHandshake = Boolean(connectAttempt?.awaitingSessionReady) || handshakeFailed;
        if (pendingHandshake) {
          rejectConnectAttempt('Failed to connect');
        }
        socket = null;
        if (manuallyClosed) {
          return;
        }
        if (pendingHandshake) {
          setStatus('Failed to connect');
          return;
        }
        setStatus(`Disconnected, retrying in ${Math.round(reconnectDelay / 1000)}s`);
        reconnectTimer = setTimeout(async () => {
          if (currentSessionId) {
            try {
              const detail = await loadSessionDetail(currentSessionId);
              renderHistory(detail.messages || []);
              await loadApprovals(currentSessionId);
            } catch (_) { /* ignore */ }
          }
          connect();
        }, reconnectDelay);
        reconnectDelay = Math.min(reconnectDelay * 2, 30000);
      });

      currentSocket.addEventListener('error', () => {
        if (socket !== currentSocket) {
          return;
        }
        if (connectAttempt?.awaitingSessionReady) {
          handshakeFailed = true;
          rejectConnectAttempt('Connection error');
        }
        setStatus('Connection error');
      });
    }

    async function ensureConnected() {
      if (socket && socket.readyState === WebSocket.OPEN) {
        return;
      }
      if (connectAttempt?.promise) {
        return connectAttempt.promise;
      }
      await closeSocket();
      wsSkipGreeting = true;
      connectAttempt = {
        resolve: null,
        reject: null,
        awaitingSessionReady: true,
        initiatedBySend: true,
        promise: null,
      };
      connectAttempt.promise = new Promise((resolve, reject) => {
        connectAttempt.resolve = resolve;
        connectAttempt.reject = reject;
        connect();
      });
      return connectAttempt.promise;
    }

    async function loadSessionList() {
      if (!currentPersonaKey) {
        sessionList = [];
        renderSessionList();
        return;
      }
      try {
        const payload = await requestJSON(`/api/sessions?persona=${encodeURIComponent(currentPersonaKey)}&limit=20`);
        sessionList = payload.sessions || [];
      } catch (error) {
        sessionList = [];
        setStatus(error.message || 'Failed to load sessions');
      }
      renderSessionList();
    }

    async function loadDefaultPersona() {
      const payload = await requestJSON('/api/personas');
      return payload.default || 'default';
    }

    async function loadSessionDetail(id) {
      return requestJSON(`/api/sessions/${encodeURIComponent(id)}`);
    }

    async function bootstrapChat() {
      setStatus('Loading...');
      const params = new URLSearchParams(location.search);
      currentPersonaKey = params.get('persona') || '';
      currentSessionId = params.get('session_id') || '';

      if (currentSessionId) {
        try {
          const detail = await loadSessionDetail(currentSessionId);
          currentPersonaKey = detail.persona || detail.Persona || currentPersonaKey;
          renderHistory(detail.messages || []);
          await loadApprovals(currentSessionId);
        } catch (error) {
          currentSessionId = '';
        }
      }

      if (!currentSessionId) {
        currentPersonaKey = currentPersonaKey || await loadDefaultPersona();
        clearMessages();
        approvals = [];
        renderApprovals();
      }

      updateSubtitle();
      syncURL();
      await loadSessionList();
      setStatus('Ready');
    }

    async function switchSession(sessionID, personaKey) {
      setStatus('Loading session...');
      try {
        const detail = await loadSessionDetail(sessionID);
        await closeSocket();
        currentSessionId = sessionID;
        currentPersonaKey = detail.persona || detail.Persona || personaKey || currentPersonaKey;
        renderHistory(detail.messages || []);
        await loadApprovals(currentSessionId);
        updateSubtitle();
        syncURL();
        renderSessionList();
        sidebarEl.classList.remove('open');
        setStatus('Ready');
      } catch (error) {
        setStatus(error.message || 'Failed to load session');
        renderSessionList();
      }
    }

    async function startNewChat() {
      await closeSocket();
      currentSessionId = '';
      clearMessages();
      approvals = [];
      renderApprovals();
      updateSubtitle();
      syncURL();
      renderSessionList();
      sidebarEl.classList.remove('open');
      setStatus('Ready');
    }

    async function deleteSession(sessionID) {
      if (!sessionID) {
        return;
      }
      if (!confirm('Delete this session?')) {
        return;
      }
      try {
        await requestJSON(`/api/sessions/${encodeURIComponent(sessionID)}`, { method: 'DELETE' });
        if (sessionID === currentSessionId) {
          await startNewChat();
        } else {
          await loadSessionList();
        }
      } catch (error) {
        setStatus(error.message || 'Failed to delete session');
        await loadSessionList();
      }
    }

    async function sendMessage(content, node) {
      setLocalUserMessageState(node, 'pending');
      setSending(true);
      try {
        await ensureConnected();
        socket.send(JSON.stringify({ type: 'message', content }));
        setLocalUserMessageState(node, 'sent');
      } catch (error) {
        setLocalUserMessageState(node, 'failed', async () => {
          await sendMessage(content, node);
        });
        setSending(false);
        setStatus(error.message || 'Failed to connect');
      }
    }

    async function sendApprovalAction(requestID, action, optionID) {
      if (!requestID || pendingApprovalActions.has(requestID)) {
        return;
      }
      pendingApprovalActions.add(requestID);
      renderApprovals();
      try {
        await ensureConnected();
        socket.send(JSON.stringify({
          type: 'approval_action',
          request_id: requestID,
          action,
          option_id: optionID || '',
        }));
      } catch (error) {
        pendingApprovalActions.delete(requestID);
        renderApprovals();
        setStatus(error.message || 'Failed to send approval action');
      }
    }

    form.addEventListener('submit', async (event) => {
      event.preventDefault();
      const content = input.value.trim();
      if (!content || sending) {
        return;
      }
      const userMessage = appendLocalUserMessage(content);
      input.value = '';
      input.style.height = '56px';
      await sendMessage(content, userMessage);
    });

    newChatButton.addEventListener('click', async () => {
      await startNewChat();
    });

    refreshSessionsButton.addEventListener('click', async () => {
      await loadSessionList();
    });

    toggleSidebarButton.addEventListener('click', () => {
      sidebarEl.classList.toggle('open');
    });

    input.addEventListener('keydown', (event) => {
      if (event.key === 'Enter' && !event.shiftKey) {
        event.preventDefault();
        form.requestSubmit();
      }
    });

    input.addEventListener('input', () => {
      input.style.height = '56px';
      input.style.height = `${Math.min(input.scrollHeight, 180)}px`;
    });

    window.addEventListener('beforeunload', () => {
      manuallyClosed = true;
      clearTimeout(reconnectTimer);
      if (socket && socket.readyState < WebSocket.CLOSING) {
        socket.close();
      }
    });

    bootstrapChat().catch((error) => {
      setStatus(error.message || 'Failed to initialize chat');
      clearMessages();
      appendMessage('error', error.message || 'Failed to initialize chat');
    });
  </script>
</body>
</html>
