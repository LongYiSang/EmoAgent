<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>EmoAgent</title>
  <link rel="stylesheet" href="shared.css">
  <style>
    /* ── Chat Main ── */
    .chat-main {
      display: grid; grid-template-columns: auto 1fr;
      min-height: 0; overflow: hidden;
    }

    /* ── Drawer ── */
    .drawer {
      width: 280px; background: rgba(255,253,251,.6);
      border-right: 1px solid var(--hair);
      display: grid; grid-template-rows: auto auto 1fr;
      transition: width .3s var(--ease-out), opacity .25s;
      overflow: hidden;
    }
    .drawer.collapsed { width: 0; opacity: 0; }
    .drawer-head { padding: 20px 18px 10px; }
    .drawer-title {
      font-size: 11px; font-weight: 700; text-transform: uppercase;
      letter-spacing: .12em; color: var(--muted); margin-bottom: 4px;
    }
    .persona-chip {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 6px 10px 6px 6px; border-radius: var(--r-pill);
      background: var(--lavender-soft); color: var(--lavender-ink);
      font-size: 12px; font-weight: 600;
    }
    .persona-dot {
      width: 18px; height: 18px; border-radius: 50%;
      background: linear-gradient(135deg, var(--lavender), var(--rose)); flex-shrink: 0;
    }
    .drawer-actions { padding: 8px 12px 12px; display: grid; grid-template-columns: 1fr auto; gap: 8px; }

    /* ── Session list ── */
    .sessions { overflow-y: auto; padding: 4px 8px 14px; display: grid; gap: 4px; align-content: start; }
    .session {
      padding: 12px 42px 12px 14px; border-radius: var(--r-sm); cursor: pointer;
      display: grid; gap: 5px; transition: background .15s var(--ease-out);
      position: relative; background: transparent; border: 0; text-align: left;
      width: 100%; outline: none;
    }
    .session:hover { background: rgba(255,181,194,.09); }
    .session:focus-visible { background: rgba(255,181,194,.12); box-shadow: 0 0 0 2px rgba(255,181,194,.22); }
    .session.active { background: #fff; box-shadow: var(--shadow-sm); }
    .session.active::before {
      content: ''; position: absolute; left: 4px; top: 50%; transform: translateY(-50%);
      width: 3px; height: 20px; border-radius: 2px; background: var(--primary-grad);
    }
    .s-title {
      font-size: 13px; font-weight: 600; color: var(--ink);
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .s-meta { font-size: 11px; color: var(--muted); font-family: var(--font-data); }
    .s-preview {
      font-size: 12px; color: var(--ink-2); opacity: .7;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap; margin-top: 1px;
    }
    .s-del {
      opacity: 0; width: 26px; height: 26px; border-radius: 8px;
      background: rgba(255,255,255,.9); border: 1px solid rgba(42,34,48,.06); color: var(--muted);
      display: grid; place-items: center; transition: all .15s var(--ease-out);
      position: absolute; top: 10px; right: 8px; box-shadow: var(--shadow-sm); pointer-events: none;
    }
    .session:hover .s-del, .session:focus-within .s-del, .session.active .s-del { opacity: 1; pointer-events: auto; }
    .s-del:hover { background: #FFF1F4; border-color: rgba(211,107,131,.18); color: var(--rose-ink); }
    .s-del svg { width: 13px; height: 13px; }
    .session-empty { padding: 14px; font-size: 12px; color: var(--muted); line-height: 1.5; }

    /* ── Conversation Area ── */
    .conv {
      display: grid; grid-template-rows: auto 1fr auto;
      min-height: 0; overflow: hidden;
      background:
        radial-gradient(800px 400px at 80% -10%, rgba(255,181,194,.06), transparent 55%),
        radial-gradient(600px 400px at 0% 110%, rgba(212,194,240,.08), transparent 55%),
        var(--surface);
    }

    /* ── Top Bar ── */
    .conv-top {
      padding: 16px 28px; border-bottom: 1px solid var(--hair);
      display: flex; align-items: center; justify-content: space-between; gap: 16px;
      background: rgba(255,253,251,.7); backdrop-filter: blur(18px); flex-shrink: 0;
    }
    .conv-top-left { display: flex; align-items: center; gap: 12px; min-width: 0; }
    .drawer-toggle {
      width: 36px; height: 36px; border-radius: 10px; border: 1px solid var(--hair);
      background: #fff; display: grid; place-items: center; color: var(--ink-2);
      transition: all .15s var(--ease-out); flex-shrink: 0;
    }
    .drawer-toggle:hover { border-color: var(--peach); color: var(--peach-ink); }
    .conv-meta { min-width: 0; }
    .conv-title {
      font-size: 16px; font-weight: 700; margin: 0; letter-spacing: -.01em;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .conv-sub {
      font-size: 12px; color: var(--muted); margin-top: 2px;
      display: flex; align-items: center; gap: 8px;
    }
    .conv-sub .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--mint-ink); flex-shrink: 0; }
    .conv-actions { display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
    .memory-scan {
      min-height: 34px; padding: 0 12px; border-radius: 10px; border: 1px solid var(--hair);
      background: #fff; color: var(--ink-2); font-size: 12px; font-weight: 700;
      display: inline-flex; align-items: center; gap: 7px; transition: all .15s var(--ease-out);
    }
    .memory-scan:hover { border-color: var(--lavender); color: var(--lavender-ink); }
    .memory-scan:disabled { opacity: .55; cursor: not-allowed; }
    .memory-status-panel {
      display: none; border-bottom: 1px solid var(--hair); background: rgba(255,253,251,.76);
      padding: 10px 28px; gap: 10px; grid-template-columns: minmax(0,1fr) minmax(0,1fr);
      font-size: 12px; color: var(--ink-2);
    }
    .memory-status-panel.visible { display: grid; }
    .memory-status-block { min-width: 0; display: grid; gap: 5px; }
    .memory-status-title {
      font-size: 10.5px; font-weight: 800; color: var(--muted);
      text-transform: uppercase; letter-spacing: .08em;
    }
    .memory-status-row {
      display: flex; align-items: center; justify-content: space-between; gap: 10px;
      min-height: 24px; padding: 4px 8px; border-radius: 8px; background: rgba(255,255,255,.74);
      border: 1px solid rgba(42,34,48,.05);
    }
    .memory-status-row span:first-child { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .memory-badge {
      flex-shrink: 0; padding: 2px 7px; border-radius: 999px; font-size: 10.5px; font-weight: 800;
      background: var(--lavender-soft); color: var(--lavender-ink); text-transform: uppercase;
    }
    .memory-badge.succeeded, .memory-badge.skipped { background: var(--mint-soft); color: var(--mint-ink); }
    .memory-badge.failed { background: #FFF1F4; color: var(--rose-ink); }

    /* ── Thread ── */
    .thread {
      overflow-y: auto; padding: 28px 28px 12px;
      display: flex; flex-direction: column; gap: 16px;
      min-height: 0; overscroll-behavior: contain;
      --thread-width: 760px;
    }
    .msg {
      max-width: var(--thread-width); width: 100%;
      display: flex; gap: 12px; align-items: flex-end;
      animation: slide-up .28s var(--ease-out);
    }
    .msg.user { align-self: flex-end; flex-direction: row-reverse; }
    .msg-av {
      width: 32px; height: 32px; flex-shrink: 0; border-radius: 50%;
      display: grid; place-items: center; font-weight: 700; font-size: 13px; color: #fff;
    }
    .msg.assistant .msg-av { background: linear-gradient(135deg, var(--lavender), var(--rose)); }
    .msg.user .msg-av { background: linear-gradient(135deg, var(--peach), var(--coral)); }
    .msg.error .msg-av { background: linear-gradient(135deg, #F3A8B7, #D86B83); }
    .bubble {
      max-width: calc(100% - 44px); padding: 14px 18px; border-radius: 22px;
      font-size: 15px; line-height: 1.6; letter-spacing: -.005em;
    }
    .msg.assistant .bubble {
      background: #fff; border: 1px solid var(--hair);
      border-bottom-left-radius: 8px; color: var(--ink); box-shadow: var(--shadow-sm);
    }
    .msg.user .bubble {
      background: linear-gradient(135deg, #3D2B3A 0%, #4E3A4D 100%);
      color: #fff; border-bottom-right-radius: 8px;
    }
    .msg.error .bubble {
      background: #FFF1F4; border: 1px solid rgba(211,107,131,.25);
      border-bottom-left-radius: 8px; color: #A33860;
    }
    .msg.pending .bubble { opacity: .75; }
    .msg.failed .bubble { border-color: rgba(211,107,131,.5); box-shadow: 0 0 0 2px rgba(211,107,131,.15); }
    .message-content { white-space: pre-wrap; word-break: break-word; }
    .message-status { margin-top: 8px; font-size: 12px; opacity: .75; color: var(--muted); }
    .msg.user .message-status { color: rgba(255,255,255,.65); }
    .message-retry {
      margin-top: 8px; display: inline-flex; align-items: center; justify-content: center;
      min-height: 30px; padding: 0 12px; border: 1px solid rgba(255,255,255,.24);
      border-radius: 999px; background: rgba(255,255,255,.14); cursor: pointer;
      font-size: 12px; font-weight: 600;
    }
    .message-retry:hover { border-color: rgba(255,255,255,.4); }

    /* ── Work progress ── */
    .progress {
      align-self: flex-start; max-width: var(--thread-width); width: 100%;
      display: flex; gap: 12px; align-items: flex-start;
    }
    .progress-av {
      width: 32px; height: 32px; flex-shrink: 0; border-radius: 50%;
      background: linear-gradient(135deg, var(--lavender), var(--rose));
      display: grid; place-items: center; color: #fff; position: relative;
    }
    .progress-av::after {
      content: ''; position: absolute; inset: -4px; border-radius: 50%;
      border: 2px solid var(--lavender); border-top-color: transparent;
      animation: spin 1s linear infinite; opacity: .6;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .progress-card {
      flex: 1; background: linear-gradient(180deg, rgba(240,232,255,.6), rgba(255,252,253,.95));
      border: 1px solid var(--lavender); border-radius: var(--r-md); border-top-left-radius: 8px;
      padding: 14px 16px; display: grid; gap: 6px;
    }
    .progress-label {
      font-size: 12px; font-weight: 700; color: var(--lavender-ink);
      text-transform: uppercase; letter-spacing: .1em;
      display: inline-flex; align-items: center; gap: 6px;
    }
    .progress-label .sparkle {
      display: inline-block; width: 10px; height: 10px; background: var(--lavender-ink);
      clip-path: polygon(50% 0%,60% 40%,100% 50%,60% 60%,50% 100%,40% 60%,0% 50%,40% 40%);
      animation: twinkle 1.4s ease-in-out infinite;
    }
    @keyframes twinkle {
      0%,100% { opacity: .4; transform: scale(.8) rotate(0deg); }
      50% { opacity: 1; transform: scale(1) rotate(45deg); }
    }
    .progress-text { font-size: 14px; color: var(--ink-2); line-height: 1.55; font-style: italic; }

    /* ── Tool activity ── */
    .tool {
      align-self: flex-start; max-width: var(--thread-width); width: 100%;
      display: flex; gap: 12px; align-items: flex-start;
      animation: slide-up .24s var(--ease-out);
    }
    .tool-av {
      width: 32px; height: 32px; flex-shrink: 0; border-radius: 50%;
      background: linear-gradient(135deg, var(--mint-soft), var(--lavender-soft));
      color: var(--mint-ink); display: grid; place-items: center; border: 1px solid rgba(63,122,92,.12);
    }
    .tool-card {
      flex: 1; min-width: 0; background: #FFFDFA; border: 1px solid var(--hair);
      border-radius: var(--r-md); border-top-left-radius: 8px; overflow: hidden; box-shadow: var(--shadow-sm);
    }
    .tool-head {
      width: 100%; border: 0; background: transparent; padding: 11px 14px;
      display: grid; grid-template-columns: 1fr auto auto; gap: 10px;
      align-items: center; text-align: left; cursor: pointer;
    }
    .tool-title { font-size: 12.5px; font-weight: 800; color: var(--ink); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .tool-badge {
      display: inline-flex; align-items: center; padding: 3px 8px; border-radius: 999px;
      font-size: 10.5px; font-weight: 800; text-transform: uppercase; letter-spacing: .08em;
      background: var(--lavender-soft); color: var(--lavender-ink);
    }
    .tool.success .tool-badge { background: var(--mint-soft); color: var(--mint-ink); }
    .tool.error .tool-badge, .tool.approval_required .tool-badge { background: #FFF1F4; color: var(--rose-ink); }
    .tool-caret { color: var(--muted); transition: transform .18s var(--ease-out); }
    .tool.expanded .tool-caret { transform: rotate(180deg); }
    .tool-body {
      display: none; border-top: 1px solid var(--hair); padding: 12px 14px;
      background: linear-gradient(180deg, #FFFDFA 0%, #FBFAF8 100%);
      gap: 9px; font-size: 12px; color: var(--ink-2);
    }
    .tool.expanded .tool-body { display: grid; }
    .tool-preview {
      margin: 0; white-space: pre-wrap; word-break: break-word;
      font-family: var(--font-mono); font-size: 11.5px; line-height: 1.55;
      padding: 10px 11px; border-radius: 11px; background: #fff; border: 1px solid var(--hair);
      max-height: 180px; overflow: auto;
    }
    .tool-meta { display: flex; flex-wrap: wrap; gap: 6px; color: var(--muted); font-family: var(--font-data); }
    .tool-meta span { padding: 3px 7px; border-radius: 999px; background: rgba(126,103,94,.1); }

    /* ── Thinking activity ── */
    .reasoning {
      align-self: flex-start; max-width: var(--thread-width); width: 100%;
      display: flex; gap: 12px; align-items: flex-start;
      animation: slide-up .24s var(--ease-out);
    }
    .reasoning-av {
      width: 32px; height: 32px; flex-shrink: 0; border-radius: 50%;
      background: linear-gradient(135deg, var(--lavender-soft), #FCE7EF);
      color: var(--lavender-ink); display: grid; place-items: center; border: 1px solid rgba(127,96,177,.16);
    }
    .reasoning-card {
      flex: 1; min-width: 0; background: #FFFDFA; border: 1px solid var(--hair);
      border-radius: var(--r-md); border-top-left-radius: 8px; overflow: hidden; box-shadow: var(--shadow-sm);
    }
    .reasoning-head {
      padding: 11px 14px; display: grid; grid-template-columns: minmax(0,1fr) auto;
      gap: 10px; align-items: center;
    }
    .reasoning-toggle {
      min-width: 0; width: 100%; border: 0; background: transparent; padding: 0;
      display: grid; grid-template-columns: 1fr auto auto; gap: 10px;
      align-items: center; text-align: left; cursor: pointer;
    }
    .reasoning-title { font-size: 12.5px; font-weight: 800; color: var(--ink); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .reasoning-badge {
      display: inline-flex; align-items: center; padding: 3px 8px; border-radius: 999px;
      font-size: 10.5px; font-weight: 800; text-transform: uppercase; letter-spacing: .08em;
      background: var(--lavender-soft); color: var(--lavender-ink);
    }
    .reasoning.done .reasoning-badge { background: var(--mint-soft); color: var(--mint-ink); }
    .reasoning-caret { color: var(--muted); transition: transform .18s var(--ease-out); }
    .reasoning.expanded .reasoning-caret { transform: rotate(180deg); }
    .reasoning-body {
      display: none; border-top: 1px solid var(--hair); padding: 12px 14px;
      background: linear-gradient(180deg, #FFFDFA 0%, #FBFAF8 100%);
      gap: 9px; font-size: 12px; color: var(--ink-2);
    }
    .reasoning.expanded .reasoning-body { display: grid; }
    .reasoning-preview {
      margin: 0; white-space: pre-wrap; word-break: break-word;
      font-family: var(--font-mono); font-size: 11.5px; line-height: 1.55;
      padding: 10px 11px; border-radius: 11px; background: #fff; border: 1px solid var(--hair);
      max-height: 220px; overflow: auto;
    }
    .reasoning-meta { display: flex; flex-wrap: wrap; gap: 6px; color: var(--muted); font-family: var(--font-data); }
    .reasoning-meta span { padding: 3px 7px; border-radius: 999px; background: rgba(126,103,94,.1); }
    .memory-pipeline-btn {
      min-height: 28px; padding: 0 10px; border-radius: 9px; border: 1px solid var(--hair);
      background: #fff; color: var(--lavender-ink); font-size: 11.5px; font-weight: 800;
      display: inline-flex; align-items: center; gap: 6px; white-space: nowrap;
      transition: all .15s var(--ease-out);
    }
    .memory-pipeline-btn:hover { border-color: var(--lavender); background: var(--lavender-soft); }
    .memory-pipeline-entry {
      align-self: flex-start; max-width: var(--thread-width); width: 100%;
      display: flex; gap: 12px; align-items: flex-start;
      animation: slide-up .24s var(--ease-out);
    }
    .memory-pipeline-av {
      width: 32px; height: 32px; flex-shrink: 0; border-radius: 50%;
      background: linear-gradient(135deg, var(--mint-soft), var(--lavender-soft));
      color: var(--mint-ink); display: grid; place-items: center; border: 1px solid rgba(63,122,92,.12);
    }
    .memory-pipeline-card {
      flex: 1; min-width: 0; border: 1px solid var(--hair); border-radius: var(--r-md);
      border-top-left-radius: 8px; background: #FFFDFA; box-shadow: var(--shadow-sm);
      padding: 11px 14px; display: flex; align-items: center; justify-content: space-between; gap: 12px;
    }
    .memory-pipeline-title { font-size: 12.5px; font-weight: 800; color: var(--ink); }
    .memory-pipeline-panel {
      position: fixed; top: 16px; right: 16px; bottom: 16px; width: min(420px, calc(100vw - 32px));
      z-index: 30; background: #FFFDFA; border: 1px solid var(--hair); border-radius: var(--r-md);
      box-shadow: var(--shadow-lg); display: none; grid-template-rows: auto 1fr; overflow: hidden;
    }
    .memory-pipeline-panel.open { display: grid; }
    .memory-pipeline-panel-head {
      padding: 14px 16px; display: flex; align-items: center; justify-content: space-between; gap: 12px;
      border-bottom: 1px solid var(--hair); background: rgba(255,253,251,.86);
    }
    .memory-pipeline-panel-title { font-size: 13px; font-weight: 850; color: var(--ink); }
    .memory-pipeline-close {
      width: 30px; height: 30px; border-radius: 9px; border: 1px solid var(--hair);
      background: #fff; color: var(--ink-2); display: grid; place-items: center;
    }
    .memory-pipeline-close:hover { border-color: var(--peach); color: var(--peach-ink); }
    .memory-pipeline-panel-body { overflow: auto; padding: 14px 16px 16px; display: grid; gap: 14px; }
    .memory-pipeline-section { display: grid; gap: 8px; min-width: 0; }
    .memory-pipeline-section-title {
      font-size: 11px; font-weight: 850; color: var(--muted);
      text-transform: uppercase; letter-spacing: .08em;
    }
    .memory-pipeline-prompt, .memory-pipeline-json {
      margin: 0; white-space: pre-wrap; word-break: break-word;
      font-family: var(--font-mono); font-size: 11.5px; line-height: 1.55;
      padding: 10px 11px; border-radius: 11px; background: #fff; border: 1px solid var(--hair);
      max-height: 260px; overflow: auto;
    }
    .memory-pipeline-stage { display: grid; gap: 6px; }
    .memory-pipeline-stage-name { font-size: 12px; font-weight: 800; color: var(--ink-2); }
    .memory-pipeline-item {
      display: grid; grid-template-columns: minmax(0,1fr) auto; gap: 10px;
      padding: 8px 10px; border-radius: 10px; background: #fff; border: 1px solid var(--hair);
      font-size: 12px; color: var(--ink-2);
    }
    .memory-pipeline-score { font-family: var(--font-mono); color: var(--lavender-ink); font-weight: 700; }
    .memory-pipeline-empty { font-size: 12px; color: var(--muted); padding: 8px 10px; }

    /* ── Approvals ── */
    .approvals-wrap { display: none !important; }
    .approval {
      background: linear-gradient(180deg, #FFFDFA 0%, #FDF4EA 100%);
      border: 1.5px solid var(--peach); border-radius: var(--r-lg); overflow: hidden;
      box-shadow: 0 12px 32px rgba(245,185,159,.18); min-width: 0;
    }
    .msg-approval { align-items: flex-start; }
    .msg-approval .approval { flex: 1; }
    .approval-top {
      padding: 14px 18px;
      background: linear-gradient(135deg, rgba(245,185,159,.18), rgba(238,141,115,.12));
      border-bottom: 1px solid rgba(245,185,159,.35);
      display: flex; align-items: center; justify-content: space-between; gap: 12px;
    }
    .approval-tag {
      display: inline-flex; align-items: center; gap: 7px;
      font-size: 12px; font-weight: 700; color: var(--peach-ink);
      text-transform: uppercase; letter-spacing: .1em;
    }
    .approval-tag .glyph {
      width: 16px; height: 16px; border-radius: 50%; background: var(--peach-ink);
      display: grid; place-items: center; color: #fff; font-size: 10px; font-weight: 800;
    }
    .approval-meta-row { display: flex; align-items: center; gap: 8px; }
    .approval-expire { font-size: 11px; color: var(--muted); font-family: var(--font-data); }
    .approval-badge {
      display: inline-flex; align-items: center; padding: 3px 8px; border-radius: 999px;
      font-size: 11px; font-weight: 700; background: var(--peach-soft); color: var(--peach-ink);
    }
    .approval-body { padding: 16px 18px; display: grid; gap: 12px; }
    .approval-title { font-size: 15px; font-weight: 700; line-height: 1.45; color: var(--ink); }
    .approval-q { font-size: 14px; color: var(--ink-2); line-height: 1.55; white-space: pre-wrap; word-break: break-word; }
    .approval-note {
      display: grid; gap: 6px; padding: 12px 14px; border: 1px solid var(--hair);
      background: rgba(255,255,255,.8); border-radius: 12px;
    }
    .approval-note-label {
      font-size: 11px; font-weight: 700; color: var(--muted);
      text-transform: uppercase; letter-spacing: .08em;
    }
    .approval-note-text { font-size: 13px; color: var(--ink-2); line-height: 1.55; white-space: pre-wrap; word-break: break-word; }
    .approval-code-wrap {
      display: grid; gap: 6px; padding: 12px 14px; border: 1px solid var(--hair);
      background: #fff; border-radius: 12px;
    }
    .approval-code {
      margin: 0; font-family: var(--font-mono); font-size: 12.5px; line-height: 1.6;
      color: var(--ink); white-space: pre-wrap; word-break: break-word;
    }
    .approval-opts { display: flex; flex-direction: column; gap: 8px; }
    .approval-opt {
      padding: 10px 14px; border: 1px solid var(--hair); background: #fff;
      border-radius: 12px; display: flex; align-items: center; justify-content: space-between;
      gap: 10px; font-size: 13px;
    }
    .opt-key {
      font-family: var(--font-mono); font-size: 11px; padding: 2px 8px;
      background: var(--surface-2); border-radius: 6px; color: var(--muted); font-weight: 600;
    }
    .approval-actions { display: flex; gap: 10px; padding-top: 2px; }
    .approval-btn {
      flex: 1; min-height: 44px; border: 0; border-radius: var(--r-sm);
      font-weight: 700; font-size: 14px;
      display: inline-flex; align-items: center; justify-content: center; gap: 8px;
      transition: all .16s var(--ease-out);
    }
    .approval-btn:disabled { opacity: .5; cursor: not-allowed; }
    .approval-btn.allow { background: var(--primary-grad); color: #fff; box-shadow: var(--shadow-glow); }
    .approval-btn.allow:hover { transform: translateY(-1px); }
    .approval-btn.deny { background: #fff; color: var(--ink); border: 1px solid var(--hair); }
    .approval-btn.deny:hover { background: var(--surface-2); border-color: var(--rose); color: var(--rose-ink); }
    .approval.consumed {
      border-color: #B9E0C9; background: linear-gradient(180deg, #FFFDFA 0%, #EAF6EF 100%); opacity: .9;
    }
    .approval.consumed .approval-top { background: rgba(185,224,201,.3); border-bottom-color: #B9E0C9; }
    .approval.consumed .approval-tag { color: var(--mint-ink); }
    .approval.consumed .approval-tag .glyph { background: var(--mint-ink); }
    .approval.settled { box-shadow: var(--shadow-sm); }
    .approval.settled .approval-body { gap: 10px; }
    .approval-summary { font-size: 13px; color: var(--ink-2); line-height: 1.5; }
    .approval-close {
      width: 28px; height: 28px; border: 0; border-radius: 9px;
      background: rgba(255,255,255,.72); color: var(--muted);
      display: grid; place-items: center; font-size: 16px; line-height: 1;
      transition: all .16s var(--ease-out); flex-shrink: 0;
    }
    .approval-close:hover { background: #fff; color: var(--ink); }

    /* ── Composer ── */
    .composer {
      padding: 12px 24px 18px; border-top: 1px solid var(--hair);
      background: rgba(255,253,251,.8); backdrop-filter: blur(18px); flex-shrink: 0;
    }
    .composer-form {
      max-width: 760px; margin: 0 auto;
      background: #fff; border: 1px solid var(--hair); border-radius: 24px;
      padding: 6px 6px 6px 18px;
      display: grid; grid-template-columns: 1fr auto; align-items: end; gap: 6px;
      box-shadow: var(--shadow-sm); transition: border-color .15s, box-shadow .15s;
    }
    .composer-form:focus-within { border-color: var(--peach); box-shadow: 0 0 0 4px rgba(245,185,159,.18); }
    .composer-form textarea {
      border: 0; background: transparent; resize: none;
      padding: 12px 6px; font-size: 15px; outline: none;
      min-height: 44px; max-height: 140px; line-height: 1.5;
      color: var(--ink); width: 100%;
    }
    .composer-form textarea::placeholder { color: var(--muted); }
    .composer-form textarea:disabled { opacity: .6; }
    .send-btn {
      width: 44px; height: 44px; border: 0; border-radius: 14px;
      background: var(--primary-grad); color: #fff;
      box-shadow: var(--shadow-glow); display: grid; place-items: center;
      transition: transform .15s var(--ease-out); flex-shrink: 0;
    }
    .send-btn:hover { transform: translateY(-1px); }
    .send-btn:disabled { opacity: .55; cursor: not-allowed; transform: none; }
    .composer-hint {
      max-width: 760px; margin: 8px auto 0;
      font-size: 11px; color: var(--muted);
      display: flex; justify-content: space-between; align-items: center;
      font-family: var(--font-data);
    }
    .composer-hint kbd {
      background: #fff; border: 1px solid var(--hair); border-radius: 5px;
      padding: 1px 5px; font-family: var(--font-mono); font-size: 10.5px;
    }

    /* ── Mobile ── */
    @media (max-width: 900px) {
      .drawer {
        position: fixed; left: 72px; top: 0; bottom: 0; z-index: 20;
        transform: translateX(-100%); opacity: 0; width: min(280px, 80vw) !important;
        background: rgba(255,253,251,.97);
        box-shadow: 18px 0 32px rgba(42,34,48,.12);
        transition: transform .22s var(--ease-out), opacity .2s;
      }
      .drawer.open { transform: translateX(0); opacity: 1; }
    }
    @media (max-width: 768px) {
      .drawer { left: 0; width: min(280px, 88vw) !important; }
    }
  </style>
</head>
<body>
<div class="app-shell">
  <!-- Rail -->
  <aside class="rail">
    <a class="rail-logo" href="/">E</a>
    <a class="rail-btn active" href="/" title="Chat">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/></svg>
      <span class="rail-tooltip">Chat</span>
    </a>
    <a class="rail-btn" href="/admin.html" title="Admin">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.6 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.6a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
      <span class="rail-tooltip">Admin</span>
    </a>
    <div class="rail-spacer"></div>
    <div class="rail-avatar" id="user-avatar">U</div>
  </aside>

  <!-- Main -->
  <div class="chat-main">
    <!-- Drawer -->
    <aside class="drawer" id="sidebar">
      <div class="drawer-head">
        <div class="drawer-title">Persona</div>
        <div class="persona-chip">
          <span class="persona-dot"></span>
          <span id="sidebar-persona">loading...</span>
        </div>
      </div>
      <div class="drawer-actions">
        <button class="btn primary" id="new-chat" type="button">+ New Chat</button>
        <button class="btn ghost" id="refresh-sessions" type="button" title="Refresh" style="width:40px;padding:0">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 0 1 15-6.7L21 8"/><path d="M21 3v5h-5"/><path d="M21 12a9 9 0 0 1-15 6.7L3 16"/><path d="M3 21v-5h5"/></svg>
        </button>
      </div>
      <div class="sessions" id="session-list">
        <div class="session-empty">正在加载会话列表...</div>
      </div>
    </aside>

    <!-- Conversation -->
    <section class="conv">
      <header class="conv-top">
        <div class="conv-top-left">
          <button class="drawer-toggle" id="toggle-sidebar" type="button">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18M3 12h18M3 18h18"/></svg>
          </button>
          <div class="conv-meta">
            <h2 class="conv-title" id="conv-title">EmoAgent</h2>
            <div class="conv-sub"><span class="dot"></span><span id="subtitle">loading...</span></div>
          </div>
        </div>
        <div class="conv-actions">
          <button class="memory-scan" id="memory-scan" type="button" disabled>
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3v18"/><path d="M5 8a4 4 0 0 1 7-2.6A4 4 0 0 1 19 8c0 4-7 8-7 8S5 12 5 8Z"/></svg>
            <span>扫描记忆</span>
          </button>
          <div class="status-chip"><span class="dot"></span><span id="status">Connecting...</span></div>
        </div>
      </header>

      <div class="memory-status-panel" id="memory-status-panel"></div>

      <div class="thread" id="messages"></div>

      <div class="approvals-wrap" id="approvals"></div>

      <div class="composer">
        <form class="composer-form" id="composer">
          <textarea id="input" placeholder="输入消息...  Enter 发送 · Shift+Enter 换行" rows="1"></textarea>
          <button class="send-btn" id="send" type="submit">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m22 2-7 20-4-9-9-4Z"/><path d="M22 2 11 13"/></svg>
          </button>
        </form>
        <div class="composer-hint">
          <span id="session-hint">No active session</span>
          <span><kbd>Enter</kbd> 发送 · <kbd>Shift+Enter</kbd> 换行</span>
        </div>
      </div>
    </section>
  </div>
</div>

<aside class="memory-pipeline-panel" id="memory-pipeline-panel" aria-hidden="true">
  <div class="memory-pipeline-panel-head">
    <div class="memory-pipeline-panel-title">记忆管线</div>
    <button class="memory-pipeline-close" id="memory-pipeline-close" type="button" aria-label="关闭记忆管线">×</button>
  </div>
  <div class="memory-pipeline-panel-body" id="memory-pipeline-panel-body"></div>
</aside>

<script>
  const statusEl = document.getElementById('status');
  const subtitleEl = document.getElementById('subtitle');
  const convTitleEl = document.getElementById('conv-title');
  const sidebarPersonaEl = document.getElementById('sidebar-persona');
  const approvalsEl = document.getElementById('approvals');
  const messagesEl = document.getElementById('messages');
  const sessionListEl = document.getElementById('session-list');
  const sidebarEl = document.getElementById('sidebar');
  const form = document.getElementById('composer');
  const input = document.getElementById('input');
  const send = document.getElementById('send');
  const newChatButton = document.getElementById('new-chat');
  const refreshSessionsButton = document.getElementById('refresh-sessions');
  const toggleSidebarButton = document.getElementById('toggle-sidebar');
  const memoryScanButton = document.getElementById('memory-scan');
  const memoryStatusPanel = document.getElementById('memory-status-panel');
  const memoryPipelinePanel = document.getElementById('memory-pipeline-panel');
  const memoryPipelinePanelBody = document.getElementById('memory-pipeline-panel-body');
  const memoryPipelineClose = document.getElementById('memory-pipeline-close');

  let socket = null;
  let reconnectDelay = 1000;
  let reconnectTimer = null;
  let pendingAssistant = null;
  let sending = false;
  let manuallyClosed = false;
  let wsSkipGreeting = false;
  let connectAttempt = null;
  let currentSessionId = new URLSearchParams(location.search).get('session_id') || '';
  let currentPersonaKey = '';
  let sessionList = [];
  let approvals = [];
  let memorySegments = [];
  let memoryJobs = [];
  const pendingApprovalActions = new Set();
  const dismissedApprovalIDs = new Set();
  let workProgressNode = null;
  const toolActivityNodes = new Map();
  const reasoningActivityNodes = new Map();
  const memoryPipelineSnapshots = new Map();

  function escapeHTML(text) {
    return String(text ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
  }
  function messageField(item, field) {
    if (!item || typeof item !== 'object') return '';
    return item[field] ?? item[field[0].toUpperCase() + field.slice(1)] ?? '';
  }
  function setStatus(text) { statusEl.textContent = text; }
  function setSending(next) {
    sending = next; input.disabled = next; send.disabled = next;
    renderApprovals(); if (!next) input.focus();
  }
  function clearMessages() {
    pendingAssistant = null; clearWorkProgress(); toolActivityNodes.clear(); reasoningActivityNodes.clear(); memoryPipelineSnapshots.clear(); messagesEl.innerHTML = '';
  }
  function timelineMillis(raw, fallback = Date.now()) {
    const parsed = Date.parse(raw || ''); return Number.isNaN(parsed) ? fallback : parsed;
  }
  function setTimelineMeta(node, kind, createdAt) {
    if (!node) return; const effective = createdAt || new Date().toISOString();
    node.dataset.timelineKind = kind; node.dataset.createdAt = effective;
    node.dataset.timelineMs = String(timelineMillis(effective));
  }
  function messageCreatedAtOf(item) { return messageField(item, 'createdAt') || messageField(item, 'created_at'); }
  function approvalCreatedAtOf(item) { return approvalField(item, 'created_at') || approvalField(item, 'createdAt'); }
  function messageMetadataOf(item) {
    const raw = messageField(item, 'metadata');
    if (!raw) return {};
    if (typeof raw === 'object') return raw;
    try { return JSON.parse(raw); } catch (_) { return {}; }
  }
  function memoryPipelineOf(metadata) {
    const snapshot = metadata?.memory_pipeline || metadata?.memoryPipeline;
    return snapshot && typeof snapshot === 'object' ? snapshot : null;
  }
  const memoryPipelineStageLabels = {
    anchor_recall: 'anchor_recall',
    rrf_fusion: 'rrf_fusion',
    sqlite_authority_filter: 'sqlite_authority_filter',
    safe_rerank: 'safe_rerank',
    final_selection_mmr: 'final_selection_mmr',
  };
  function memoryPipelineField(item, field) {
    if (!item || typeof item !== 'object') return '';
    return item[field] ?? item[field[0].toUpperCase() + field.slice(1)] ?? '';
  }
  function formatMemoryPipelineScore(value) {
    if (value === undefined || value === null || value === '') return '';
    const n = Number(value);
    if (!Number.isFinite(n)) return String(value);
    return n.toFixed(4).replace(/0+$/,'').replace(/\.$/,'');
  }
  function renderMemoryPipelineButton(snapshotKey) {
    const button = document.createElement('button');
    button.className = 'memory-pipeline-btn';
    button.type = 'button';
    button.textContent = '记忆管线';
    button.addEventListener('click', event => {
      event.stopPropagation();
      openMemoryPipelinePanel(memoryPipelineSnapshots.get(snapshotKey));
    });
    return button;
  }
  function openMemoryPipelinePanel(snapshot) {
    if (!snapshot) return;
    renderMemoryPipelinePanel(snapshot);
    memoryPipelinePanel?.classList.add('open');
    memoryPipelinePanel?.setAttribute('aria-hidden', 'false');
  }
  function closeMemoryPipelinePanel() {
    memoryPipelinePanel?.classList.remove('open');
    memoryPipelinePanel?.setAttribute('aria-hidden', 'true');
  }
  function renderMemoryPipelinePanel(snapshot) {
    const promptBlock = memoryPipelineField(snapshot, 'prompt_block') || memoryPipelineField(snapshot, 'promptBlock');
    const queryAnalysis = memoryPipelineField(snapshot, 'query_analysis') || memoryPipelineField(snapshot, 'queryAnalysis') || {};
    const normalized = memoryPipelineField(queryAnalysis, 'normalized');
    const scores = memoryPipelineField(queryAnalysis, 'scores') || {};
    const stages = memoryPipelineField(snapshot, 'stages') || {};
    const scoreLines = Object.entries(scores)
      .map(([key, value]) => `${key}: ${formatMemoryPipelineScore(value)}`)
      .join('\n');
    const stageHTML = Object.keys(memoryPipelineStageLabels).map(stageKey => {
      const items = Array.isArray(stages[stageKey]) ? stages[stageKey] : [];
      const rows = items.map(item => {
        const summary = memoryPipelineField(item, 'content_summary') || memoryPipelineField(item, 'contentSummary') || '(empty)';
        const score = formatMemoryPipelineScore(memoryPipelineField(item, 'score'));
        return `<div class="memory-pipeline-item"><span>${escapeHTML(summary)}</span><span class="memory-pipeline-score">${escapeHTML(score)}</span></div>`;
      }).join('') || '<div class="memory-pipeline-empty">无记录</div>';
      return `<div class="memory-pipeline-stage"><div class="memory-pipeline-stage-name">${escapeHTML(memoryPipelineStageLabels[stageKey])}</div>${rows}</div>`;
    }).join('');
    memoryPipelinePanelBody.innerHTML = `
      <section class="memory-pipeline-section">
        <div class="memory-pipeline-section-title">prompt_block</div>
        <pre class="memory-pipeline-prompt">${escapeHTML(promptBlock || '(empty)')}</pre>
      </section>
      <section class="memory-pipeline-section">
        <div class="memory-pipeline-section-title">query_analysis</div>
        <pre class="memory-pipeline-json">${escapeHTML([normalized ? `normalized: ${normalized}` : '', scoreLines].filter(Boolean).join('\n') || '(empty)')}</pre>
      </section>
      <section class="memory-pipeline-section">
        <div class="memory-pipeline-section-title">stages</div>
        ${stageHTML}
      </section>`;
  }
  memoryPipelineClose?.addEventListener('click', closeMemoryPipelinePanel);

  function insertApprovalNode(node) {
    if (!node) return;
    const nodeMs = Number(node.dataset.timelineMs || `${Date.now()}`);
    for (const child of messagesEl.children) {
      if (child === node || child === workProgressNode) continue;
      const childMs = Number(child.dataset.timelineMs || `${Number.MAX_SAFE_INTEGER}`);
      if (nodeMs < childMs) { messagesEl.insertBefore(node, child); return; }
    }
    if (workProgressNode && workProgressNode.parentNode === messagesEl) { messagesEl.insertBefore(node, workProgressNode); return; }
    messagesEl.appendChild(node);
  }

  function appendMessage(role, content, options = {}) {
    const node = document.createElement('div');
    node.className = `msg ${role}`;
    const av = document.createElement('div');
    av.className = 'msg-av';
    av.textContent = role === 'user' ? 'U' : (role === 'error' ? '!' : 'E');
    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    const body = document.createElement('div');
    body.className = 'message-content';
    body.textContent = content;
    bubble.appendChild(body);
    node.appendChild(av); node.appendChild(bubble);
    setTimelineMeta(node, 'message', options.createdAt);
    messagesEl.appendChild(node);
    if (!options.skipScroll) scrollToBottom();
    return node;
  }
  function setMessageContent(node, content) {
    if (!node) return;
    const body = node.querySelector('.message-content');
    if (body) body.textContent = content; else node.textContent = content;
    scrollToBottom();
  }
  function messageTextOf(node) {
    if (!node) return '';
    return node.dataset.messageContent || node.querySelector('.message-content')?.textContent || '';
  }
  function setLocalUserMessageState(node, state, onRetry) {
    if (!node) return;
    node.classList.toggle('pending', state === 'pending');
    node.classList.toggle('failed', state === 'failed');
    const bubble = node.querySelector('.bubble');
    bubble?.querySelector('.message-status')?.remove();
    bubble?.querySelector('.message-retry')?.remove();
    if (state === 'pending' || state === 'failed') {
      const s = document.createElement('div'); s.className = 'message-status';
      s.textContent = state === 'pending' ? 'Sending...' : 'Send failed';
      bubble?.appendChild(s);
    }
    if (state === 'failed' && typeof onRetry === 'function') {
      const btn = document.createElement('button');
      btn.className = 'message-retry'; btn.type = 'button'; btn.textContent = 'Retry';
      btn.addEventListener('click', () => { onRetry(); }); bubble?.appendChild(btn);
    }
  }
  function appendLocalUserMessage(content) {
    const node = appendMessage('user', content, { createdAt: new Date().toISOString() });
    node.dataset.messageContent = content; setLocalUserMessageState(node, 'pending'); return node;
  }
  function renderHistory(messages) {
    clearMessages();
    for (const item of messages || []) {
      const role = messageField(item, 'role') || 'assistant';
      const content = messageField(item, 'content');
      if (role === 'assistant') renderThinkingBlocksFromMetadata(messageMetadataOf(item), messageCreatedAtOf(item), item.ID || item.id || messageField(item, 'id'));
      if (content) appendMessage(role, content, { createdAt: messageCreatedAtOf(item), skipScroll: true });
    }
    scrollToBottom();
  }
  function renderMemoryPipelineEntry(snapshot, createdAt, snapshotKey) {
    if (!snapshot) return;
    memoryPipelineSnapshots.set(snapshotKey, snapshot);
    const node = document.createElement('div');
    node.className = 'memory-pipeline-entry';
    setTimelineMeta(node, 'memory_pipeline', createdAt || new Date().toISOString());
    node.innerHTML = `
      <div class="memory-pipeline-av"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3v18"/><path d="M5 8h14"/><path d="M5 16h14"/><circle cx="5" cy="8" r="2"/><circle cx="19" cy="16" r="2"/></svg></div>
      <div class="memory-pipeline-card">
        <div class="memory-pipeline-title">记忆管线快照</div>
      </div>`;
    node.querySelector('.memory-pipeline-card')?.appendChild(renderMemoryPipelineButton(snapshotKey));
    messagesEl.appendChild(node);
  }

  function approvalField(item, field) {
    if (!item || typeof item !== 'object') return '';
    return item[field] ?? item[field[0].toUpperCase() + field.slice(1)] ?? '';
  }
  function approvalOptionsOf(item) { return item?.options || item?.Options || []; }
  function approvalIdOf(item) { return approvalField(item, 'id'); }
  function approvalStatusOf(item) { return approvalField(item, 'status') || 'pending'; }
  function approvalQuestionLines(text) { return String(text || '').split(/\r?\n/).map(l => l.trim()).filter(Boolean); }

  function appendApprovalQuestionDetails(body, question, recommendationReason) {
    for (const line of approvalQuestionLines(question)) {
      if (line.startsWith('命令：') || line.startsWith('调用：')) {
        const wrap = document.createElement('div'); wrap.className = 'approval-code-wrap';
        const label = document.createElement('div'); label.className = 'approval-note-label';
        label.textContent = line.startsWith('命令：') ? '命令' : '调用';
        const code = document.createElement('pre'); code.className = 'approval-code';
        code.textContent = line.slice(3).trim();
        wrap.appendChild(label); wrap.appendChild(code); body.appendChild(wrap); continue;
      }
      const q = document.createElement('div'); q.className = 'approval-q'; q.textContent = line; body.appendChild(q);
    }
    if (!recommendationReason) return;
    const note = document.createElement('div'); note.className = 'approval-note';
    const label = document.createElement('div'); label.className = 'approval-note-label'; label.textContent = '原因';
    const t = document.createElement('div'); t.className = 'approval-note-text'; t.textContent = recommendationReason;
    note.appendChild(label); note.appendChild(t); body.appendChild(note);
  }

  function mergeApprovals(items) {
    const merged = [];
    for (const item of items || []) {
      const id = approvalIdOf(item); if (!id) continue;
      const idx = merged.findIndex(c => approvalIdOf(c) === id);
      if (idx >= 0) merged[idx] = item; else merged.push(item);
    }
    return merged;

          if (connectAttempt?.awaitingSessionReady) resolveConnectAttempt();
          await loadSessionList(); await loadApprovals(currentSessionId); await loadMemoryStatus(currentSessionId); break;
        case 'greeting': appendMessage('assistant', payload.content || ''); break;
        case 'stream_start': pendingAssistant = null; toolActivityNodes.clear(); reasoningActivityNodes.clear(); setSending(true); break;
        case 'reasoning_start': pendingAssistant = null; upsertReasoningActivity(payload.reasoning || payload.Reasoning, false, false); break;
        case 'reasoning_delta': pendingAssistant = null; upsertReasoningActivity(payload.reasoning || payload.Reasoning, false, true); break;
        case 'reasoning_end': pendingAssistant = null; upsertReasoningActivity(payload.reasoning || payload.Reasoning, true, false); break;
        case 'stream_delta':
          if (!pendingAssistant) pendingAssistant = appendMessage('assistant', '');
          setMessageContent(pendingAssistant, `${messageTextOf(pendingAssistant)}${payload.content || ''}`); break;
        case 'stream_end':
          pendingAssistant = null; collapseReasoningActivities(); clearWorkProgress(); pendingApprovalActions.clear(); setSending(false);
          await loadSessionList();
          if (currentSessionId) {
            try { const d = await loadSessionDetail(currentSessionId); renderHistory(d.messages || []); } catch (_) {}
          }
          await loadApprovals(currentSessionId); await loadMemoryStatus(currentSessionId); break;
        case 'tool_call_start': pendingAssistant = null; upsertToolActivity(payload.tool || payload.Tool, false); break;
        case 'tool_call_end': pendingAssistant = null; upsertToolActivity(payload.tool || payload.Tool, true); break;
        case 'error':
          appendMessage('error', payload.content || 'Unknown error');
          pendingAssistant = null; clearWorkProgress(); pendingApprovalActions.clear(); setSending(false);
          await loadSessionList(); await loadApprovals(currentSessionId); await loadMemoryStatus(currentSessionId); break;
        case 'approval_required': case 'approval_updated': upsertApproval(payload.approval || payload.Approval); break;
        case 'work_progress': showWorkProgress(payload.content || ''); break;
        case 'work_progress_end': clearWorkProgress(); break;
        case 'pong': break;
      }
    });
    ws.addEventListener('close', () => {
      if (socket !== ws) return;
      pendingAssistant = null; clearWorkProgress(); setSending(false);
      const pendingHS = Boolean(connectAttempt?.awaitingSessionReady) || handshakeFailed;
      if (pendingHS) rejectConnectAttempt('Failed to connect');
      socket = null; if (manuallyClosed) return;
      if (pendingHS) { setStatus('Failed to connect'); return; }
      setStatus(`Disconnected, retrying in ${Math.round(reconnectDelay/1000)}s`);
      reconnectTimer = setTimeout(async () => {
        if (currentSessionId) { try { const d = await loadSessionDetail(currentSessionId); renderHistory(d.messages || []); await loadApprovals(currentSessionId); await loadMemoryStatus(currentSessionId); } catch (_) {} }
        connect();
      }, reconnectDelay);
      reconnectDelay = Math.min(reconnectDelay * 2, 30000);
    });
    ws.addEventListener('error', () => {
      if (socket !== ws) return;
      if (connectAttempt?.awaitingSessionReady) { handshakeFailed = true; rejectConnectAttempt('Connection error'); }
      setStatus('Connection error');
    });
  }
  async function ensureConnected() {
    if (socket?.readyState === WebSocket.OPEN) return;
    if (connectAttempt?.promise) return connectAttempt.promise;
    await closeSocket(); wsSkipGreeting = true;
    connectAttempt = { resolve:null, reject:null, awaitingSessionReady:true, initiatedBySend:true, promise:null };
    connectAttempt.promise = new Promise((res, rej) => { connectAttempt.resolve = res; connectAttempt.reject = rej; connect(); });
    return connectAttempt.promise;
  }
  async function loadSessionList() {
    if (!currentPersonaKey) { sessionList = []; renderSessionList(); return; }
    try { const p = await requestJSON(`/api/sessions?persona=${encodeURIComponent(currentPersonaKey)}&limit=20`); sessionList = p.sessions || []; }
    catch (e) { sessionList = []; setStatus(e.message || 'Failed to load sessions'); }
    renderSessionList();
  }
  async function loadDefaultPersona() {
    try { const a = await requestJSON('/api/agent-configs/active'); if (a?.persona_key) return a.persona_key; } catch (_) {}
    const p = await requestJSON('/api/personas'); return (p.personas || [])[0]?.key || '';
  }
  async function loadSessionDetail(id) { return requestJSON(`/api/sessions/${encodeURIComponent(id)}`); }
  async function bootstrapChat() {
    setStatus('Loading...');
    const params = new URLSearchParams(location.search);
    currentPersonaKey = params.get('persona') || ''; currentSessionId = params.get('session_id') || '';
    clearApprovalState();
    if (currentSessionId) {
      try { const d = await loadSessionDetail(currentSessionId); currentPersonaKey = d.persona || d.Persona || currentPersonaKey; renderHistory(d.messages || []); await loadApprovals(currentSessionId); await loadMemoryStatus(currentSessionId); }
      catch (_) { currentSessionId = ''; }
    }
    if (!currentSessionId) { currentPersonaKey = currentPersonaKey || await loadDefaultPersona(); clearMessages(); renderApprovals(); await loadMemoryStatus(''); }
    updateSubtitle(); syncURL(); await loadSessionList(); setStatus('Ready');
  }
  async function switchSession(sessionID, personaKey) {
    setStatus('Loading session...');
    try {
      const d = await loadSessionDetail(sessionID); await closeSocket(); clearApprovalState();
      currentSessionId = sessionID; currentPersonaKey = d.persona || d.Persona || personaKey || currentPersonaKey;
      renderHistory(d.messages || []); await loadApprovals(currentSessionId); await loadMemoryStatus(currentSessionId);
      updateSubtitle(); syncURL(); renderSessionList(); closeMobileDrawer(); setStatus('Ready');
    } catch (e) { setStatus(e.message || 'Failed to load session'); renderSessionList(); }
  }
  async function startNewChat() {
    await closeSocket(); clearApprovalState(); currentSessionId = ''; clearMessages(); renderApprovals(); await loadMemoryStatus('');
    updateSubtitle(); syncURL(); renderSessionList(); closeMobileDrawer(); setStatus('Ready');
  }
  async function deleteSession(sessionID) {
    if (!sessionID || !confirm('Delete this session?')) return;
    try { await requestJSON(`/api/sessions/${encodeURIComponent(sessionID)}`, {method:'DELETE'});
      if (sessionID === currentSessionId) await startNewChat(); else await loadSessionList();
    } catch (e) { setStatus(e.message || 'Failed to delete session'); await loadSessionList(); }
  }
  async function sendMessage(content, node) {
    setLocalUserMessageState(node, 'pending'); setSending(true);
    try { await ensureConnected(); socket.send(JSON.stringify({type:'message', content})); setLocalUserMessageState(node, 'sent'); }
    catch (e) { setLocalUserMessageState(node, 'failed', async () => { await sendMessage(content, node); }); setSending(false); setStatus(e.message || 'Failed to connect'); }
  }
  async function sendApprovalAction(requestID, action, optionID) {
    if (!requestID || pendingApprovalActions.has(requestID)) return;
    pendingApprovalActions.add(requestID); renderApprovals();
    try { await ensureConnected(); socket.send(JSON.stringify({type:'approval_action', request_id:requestID, action, option_id:optionID||''})); }
    catch (e) { pendingApprovalActions.delete(requestID); renderApprovals(); setStatus(e.message || 'Failed to send approval action'); }
  }
  function closeMobileDrawer() { if (window.innerWidth <= 900) sidebarEl.classList.remove('open'); }
  function toggleDrawer() {
    if (window.innerWidth <= 900) sidebarEl.classList.toggle('open');
    else sidebarEl.classList.toggle('collapsed');
  }

  form.addEventListener('submit', async e => {
    e.preventDefault(); const content = input.value.trim();
    if (!content || sending) return;
    const userMsg = appendLocalUserMessage(content); input.value = ''; input.style.height = '44px';
    await sendMessage(content, userMsg);
  });
  newChatButton.addEventListener('click', async () => { await startNewChat(); });
  refreshSessionsButton.addEventListener('click', async () => { await loadSessionList(); });
  toggleSidebarButton.addEventListener('click', toggleDrawer);
  memoryScanButton.addEventListener('click', queueMemoryExtraction);
  input.addEventListener('keydown', e => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); form.requestSubmit(); } });
  input.addEventListener('input', () => { input.style.height = '44px'; input.style.height = `${Math.min(input.scrollHeight, 140)}px`; });
  window.addEventListener('beforeunload', () => { manuallyClosed = true; clearTimeout(reconnectTimer); if (socket?.readyState < WebSocket.CLOSING) socket.close(); });

  bootstrapChat().catch(e => { setStatus(e.message || 'Failed to initialize chat'); clearMessages(); appendMessage('error', e.message || 'Failed to initialize chat'); });
</script>
