presets:
  - id: openai
    name: OpenAI
    protocol: openai_compatible
    base_url: https://api.openai.com
    api_key_env: OPENAI_API_KEY
    model_discovery: openai_models
    chat_completions_path: /v1/chat/completions
    models_path: /v1/models
    documentation_url: https://platform.openai.com/docs
    capabilities:
      reasoning_request_style: reasoning_effort
    admin:
      visible_params: [max_tokens, temperature, stream, top_p, presence_penalty, frequency_penalty, reasoning_effort, extra]
      main_defaults:
        max_tokens: 8192
        temperature: 0.7
        stream: true
      summary_defaults:
        max_tokens: 2048
        temperature: 0.1
        stream: false
  - id: moonshot
    name: Moonshot
    protocol: openai_compatible
    base_url: https://api.moonshot.cn
    api_key_env: MOONSHOT_API_KEY
    model_discovery: openai_models
    chat_completions_path: /v1/chat/completions
    models_path: /v1/models
    documentation_url: https://platform.kimi.com/docs/api/overview
    capabilities:
      reasoning_request_style: thinking_type
      reasoning_response_style: reasoning_content
      tool_reasoning_continuation: preserve_during_tool_loop
    admin:
      visible_params: [max_tokens, temperature, stream, thinking_mode, extra]
      main_defaults:
        max_tokens: 16384
        temperature: 1
        stream: true
        thinking:
          mode: enabled
      summary_defaults:
        max_tokens: 4096
        temperature: 0.1
        stream: false
        thinking:
          mode: disabled
  - id: deepseek
    name: DeepSeek
    protocol: openai_compatible
    base_url: https://api.deepseek.com
    api_key_env: DEEPSEEK_API_KEY
    model_discovery: openai_models
    chat_completions_path: /v1/chat/completions
    models_path: /v1/models
    documentation_url: https://api-docs.deepseek.com/zh-cn/guides/thinking_mode
    capabilities:
      reasoning_request_style: thinking_type
      reasoning_response_style: reasoning_content
      tool_reasoning_continuation: preserve_during_tool_loop
      thinking_effort_fallback_to_reasoning: true
    admin:
      visible_params: [max_tokens, stream, reasoning_effort, thinking_mode, extra]
      main_defaults:
        max_tokens: 16384
        stream: true
        reasoning_effort: high
        thinking:
          mode: enabled
      summary_defaults:
        max_tokens: 2048
        stream: false
        thinking:
          mode: disabled
  - id: anthropic
    name: Anthropic
    protocol: anthropic
    base_url: https://api.anthropic.com
    api_key_env: ANTHROPIC_API_KEY
    model_discovery: anthropic_models
    chat_completions_path: /v1/messages
    models_path: /v1/models
    documentation_url: https://docs.anthropic.com/
    capabilities:
      reasoning_request_style: anthropic_thinking
      reasoning_response_style: anthropic_thinking_blocks
      tool_reasoning_continuation: preserve_during_tool_loop
    admin:
      visible_params: [max_tokens, temperature, stream, thinking_mode, thinking_budget, extra]
      main_defaults:
        max_tokens: 8192
        temperature: 0.7
        stream: true
        thinking:
          mode: enabled
          budget_tokens: 4096
      summary_defaults:
        max_tokens: 2048
        temperature: 0.1
        stream: false
  - id: gemini
    name: Gemini
    protocol: openai_compatible
    base_url: https://generativelanguage.googleapis.com/v1beta/openai
    api_key_env: GEMINI_API_KEY
    model_discovery: openai_models
    chat_completions_path: /chat/completions
    models_path: /models
    documentation_url: https://ai.google.dev/gemini-api/docs/openai
    admin:
      visible_params: [max_tokens, temperature, stream, top_p, extra]
      main_defaults:
        max_tokens: 8192
        temperature: 0.7
        stream: true
      summary_defaults:
        max_tokens: 2048
        temperature: 0.1
        stream: false
  - id: qwen_dashscope_cn
