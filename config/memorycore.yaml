# MemoryCore fallback / overlay defaults.
#
# EmoAgent now treats config.yaml + Provider Center + runtime settings as the
# primary configuration entrypoint. When EmoAgent opens MemoryCore it injects
# its ProviderRegistry and runtime overrides into this file. Keep this YAML for
# MemoryCore structural defaults; do not store plaintext API keys here.
schema_version: memorycore.config.v0.2
enabled: true

core:
  db_path: ./data/memory.db
  persona_id: default
  auto_migrate: true
  enable_fts: true

pipelines:
  prefilter:
    enabled: true
    provider_id: deepseek
    model: deepseek-v4-flash
    params:
      temperature: 0
      top_p: 1
      max_output_tokens: 4096
      response_format: json_object
      timeout_ms: 30000
    thinking:
      type: disabled
    retry_on_schema_failure: 1

  extraction:
    enabled: true
    provider_id: deepseek
    model: deepseek-v4-flash
    mode: apply
    params:
      temperature: 0
      top_p: 1
      max_output_tokens: 4096
      response_format: json_object
      stream: false
      timeout_ms: 30000
    thinking:
      type: disabled
    retry_on_schema_failure: 1
    audit:
      enabled: true
      force: false
    raw_log:
      enabled: true
      directory: "./data/raw_log_extraction"

  extraction_repair:
    enabled: true
    provider_id: deepseek
    model: deepseek-v4-flash
    params:
      temperature: 0
      top_p: 1
      max_output_tokens: 8192
      response_format: json_object
      timeout_ms: 30000
    thinking:
      type: disabled

  query_analysis:
    enabled: true
    mode: sidecar
    runtime_mode: adaptive_safe
    fallback_mode: rule_only
    provider_id: deepseek
    model: deepseek-v4-flash
    timeout_ms: 32000
    params:
      temperature: 0
      top_p: 1
      max_output_tokens: 4096
      response_format: json_object
    thinking:
      type: disabled

retrieval:
  use_fts: true
  use_mirror: true
  allow_historical: false
  allow_deep_archive: false
  sensitivity_permission: normal
  final_memory_count: 8
  context_budget_tokens: 4096

semantic_ops:
  semantic_mirror_meta_enabled: true
  semantic_sidecar_auth_token_enabled: false
  dedup:
    enabled: true
    shadow: false
    enforce: true
    candidate_limit: 12
    threshold_profile: default_v0
  forget:
    preview_enabled: true
    execute_enabled: true
  curation:
    enabled: true
    mode: apply
    max_new_facts_per_run: 100
    candidate_limit_per_fact: 20
    max_facts_per_group: 8
    min_auto_apply_confidence: 0.88
    raw_log:
      enabled: true
      directory: "./data/raw_log_curation"
    llm:
      provider_id: deepseek
      model: deepseek-v4-flash
      max_tokens: 8192
      response_format: json_object
      timeout_ms: 60000
      thinking:
        type: disabled
    candidate_retrieval:
      mode: mirror_first
      mirror_min_similarity: 0.70

sidecar:
  enabled: true
  url: http://127.0.0.1:8765
  adapter: trivium
  total_timeout_ms: 45000
  mirror_timeout_ms: 18000
  activation_timeout_ms: 15000
  rerank_timeout_ms: 18000
  circuit_breaker:
    enabled: true
    window: 20
    failure_threshold: 3
    open_ms: 60000
  activation_budget:
    max_edges_scanned_per_request: 10000
    max_neighbors_per_node: 100
    max_wall_ms: 120

mirror:
  enabled: true
  sync_limit: 100
  rebuild_on_start: false
  stale_lag_threshold_ms: 30000

natural_memory:
  enabled: true
  algorithm_version: natural_power_sleep_v1
  sleep_cycle:
    enabled: true
    local_time: "03:30"
    timezone: ""
    min_interval_hours: 20
    run_missed_on_start: false
    jitter_minutes: 0
    night_window_start: "01:00"
    night_window_end: "05:00"
    warn_if_outside_night_window: true
  manual_trigger:
    enabled: true
    allow_force: true
    allow_dry_run: true
    mark_sleep_cycle_by_default: false
  search_tier:
    enabled: true
    write_memory_search_documents: true
    update_only_search_tier_and_updated_at: true
    hot_min: 0.65
    warm_min: 0.40
    cold_min: 0.20
    default_faded_tier: deep_cold
    enqueue_mirror_upsert_on_tier_change: true
  scoring:
    model: power_law_with_reactivation
    default_decay_exponent: 0.6
    reactivation_threshold: 0.55
    reactivation_gain: 0.35
    first_sleep_boost: 0.25
    first_sleep_window_hours: 36
    emotion_salience_lambda: 0.15
    emotion_persistence_lambda: 0.15
  fact_defaults:
    core_identity:
      tau_days: 0
      alpha: 0
      protected: true
    significant_event:
      tau_days: 180
      alpha: 0.45
    stable_preference:
      tau_days: 90
      alpha: 0.55
    relational_state:
      tau_days: 60
      alpha: 0.65
    commitment:
      tau_days: 0
      alpha: 0.80
      use_valid_to: true
    transient_context:
      tau_days: 7
      alpha: 0.90
    task_relevant_context:
      tau_days: 3
      alpha: 1.00
  protection:
    protect_pinned: true
    protect_core_identity: true
    protect_active_commitment: true
    protect_explicit_boundary: true
    protected_min_tier: warm
  compression:
    enabled: true
    emit_candidates: true
    apply_without_llm: false
    min_cluster_size: 3
    max_candidates_per_run: 20
    allowed_source_tiers:
      - cold
      - deep_cold
    exclude_fact_types:
      - core_identity
      - commitment
    require_min_confidence: 0.70
    require_low_sensitivity: true
  limits:
    max_candidates_per_run: 5000
    max_writes_per_run: 1000
    batch_size: 200
    max_explain_items: 100

write_policy:
  triggers:
    session_end:
      enabled: true
    manual_pin:
      enabled: true
    manual_forget:
      enabled: true
  extraction:
    allow_inference: true
    allow_sensitive_extraction: true
    max_facts_per_request: 12
    max_links_per_request: 20
  prefilter:
    keep_manual_pin_always: true
    route_manual_forget_always: true
