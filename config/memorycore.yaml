# Standalone fallback / overlay for MemoryCore.
#
# EmoAgent now treats config.yaml + Provider Center + runtime settings as the
# primary configuration entrypoint. When EmoAgent opens MemoryCore it injects
# its ProviderRegistry and runtime overrides into this file. Keep this YAML for
# standalone MemoryCore runs and transition-time defaults; do not store plaintext
# API keys here. Use api_key_env only.
schema_version: memorycore.config.v0.2
enabled: true

core:
  db_path: ./data/memory.db
  persona_id: default
  auto_migrate: true
  enable_fts: true

providers:
  llm:
    - id: llm_main
      provider: deepseek
      protocol: openai_compatible
      base_url: https://api.deepseek.com
      api_key_env: MEMORYCORE_LLM_API_KEY
      enabled: true
      timeout_ms: 30000
      retry:
        max_attempts: 5
        backoff_ms: 20000

pipelines:
  prefilter:
    enabled: true
    provider_id: llm_main
    model: deepseek-v4-flash
    params:
      temperature: 0
      top_p: 1
      max_output_tokens: 4096
      response_format: json_object
      timeout_ms: 30000
    thinking:
      type: disabled
    retry_on_schema_failure: 1

  extraction:
    enabled: true
    provider_id: llm_main
    model: deepseek-v4-flash
    mode: apply
    params:
      temperature: 0
      top_p: 1
      max_output_tokens: 4096
      response_format: json_object
      stream: false
      timeout_ms: 30000
    thinking:
      type: disabled
    retry_on_schema_failure: 1
    audit:
      enabled: true
      force: false
    raw_log:
      enabled: true
      directory: "./data/raw_log_extraction"

  extraction_repair:
    enabled: true
    provider_id: llm_main
    model: deepseek-v4-flash
    params:
      temperature: 0
      top_p: 1
      max_output_tokens: 8192
      response_format: json_object
      timeout_ms: 30000
    thinking:
      type: disabled

  query_analysis:
    enabled: true
    mode: sidecar
    runtime_mode: adaptive_safe
    fallback_mode: rule_only
    provider_id: llm_main
    model: deepseek-v4-flash
    timeout_ms: 32000
    params:
      temperature: 0
      top_p: 1
      max_output_tokens: 4096
      response_format: json_object
    thinking:
      type: disabled

retrieval:
  use_fts: true
  use_mirror: true
  allow_historical: false
  allow_deep_archive: false
  sensitivity_permission: normal
  final_memory_count: 8
  context_budget_tokens: 4096

semantic_ops:
  semantic_mirror_meta_enabled: true
  semantic_sidecar_auth_token_enabled: false
  dedup:
    enabled: true
    shadow: false
    enforce: true
    candidate_limit: 12
    threshold_profile: default_v0
  forget:
    preview_enabled: true
    execute_enabled: true
  curation:
    enabled: true
    mode: apply
    max_new_facts_per_run: 100
    candidate_limit_per_fact: 20
    max_facts_per_group: 8
    min_auto_apply_confidence: 0.88
    raw_log:
      enabled: true
      directory: "D:/Dev/Project/Agent/EmoAgent/data/raw_log_curation"
    llm:
      provider_id: llm_main
      model: deepseek-v4-flash
      max_tokens: 8192
      response_format: json_object
      timeout_ms: 60000
      thinking:
        type: disabled
    candidate_retrieval:
      mode: mirror_first
      mirror_min_similarity: 0.70

sidecar:
  enabled: true
  url: http://127.0.0.1:8765
  adapter: trivium
  total_timeout_ms: 45000
  mirror_timeout_ms: 18000
  activation_timeout_ms: 15000
  rerank_timeout_ms: 18000
  circuit_breaker:
    enabled: true
    window: 20
    failure_threshold: 3
    open_ms: 60000
  activation_budget:
    max_edges_scanned_per_request: 10000
    max_neighbors_per_node: 100
    max_wall_ms: 120

mirror:
  enabled: true
  sync_limit: 100
  rebuild_on_start: false
  stale_lag_threshold_ms: 30000

write_policy:
  triggers:
    session_end:
      enabled: true
    manual_pin:
      enabled: true
    manual_forget:
      enabled: true
  extraction:
    allow_inference: true
    allow_sensitive_extraction: true
    max_facts_per_request: 12
    max_links_per_request: 20
  prefilter:
    keep_manual_pin_always: true
    route_manual_forget_always: true
