# EmoAgent Configuration

server:
  host: "127.0.0.1"
  port: 8080

chat:
  realtime_streaming: false

context:
  input_budget_tokens: 216000
  soft_compact_ratio: 0.75
  hard_compact_ratio: 0.92
  reserve_output_tokens: 16384
  keep_recent_user_turns: 6
  tool_result_soft_tokens: 1000
  tool_result_hard_tokens: 3000

llm_providers:
  - id: "moonshot"
    name: "Moonshot"
    preset_id: "moonshot"
    protocol: "openai_compatible"
    base_url: "https://api.moonshot.cn"
    api_key_env: "OPENAI_API_KEY"
    model_discovery: "openai_models"
    enabled: true
  - id: "anthropic"
    name: "Anthropic"
    preset_id: "anthropic"
    protocol: "anthropic"
    base_url: "https://api.anthropic.com"
    api_key_env: "ANTHROPIC_API_KEY"
    model_discovery: "anthropic_models"
    enabled: false

agent_configs:
  - id: "default"
    name: "Default"
    persona_key: "default"
    emotion:
      main:
        provider_id: "moonshot"
        model: "kimi-k2.6"
        params:
          max_tokens: 8192
          temperature: 1
          stream: true
      summary:
        provider_id: "moonshot"
        model: "kimi-k2.6"
        params:
          max_tokens: 4096
          temperature: 0.1
          stream: false
    work:
      main:
        provider_id: "moonshot"
        model: "kimi-k2.6"
        params:
          max_tokens: 4096
          temperature: 0.3
      summary:
        provider_id: "moonshot"
        model: "kimi-k2.6"
        params:
          max_tokens: 2048
          temperature: 0.1
          stream: false
    context_overrides: {}

agent:
  active_config: "default"

memory:
  enabled: false

work:
  max_tool_rounds: 24
  max_input_tokens: 100000
  compress_soft_ratio: 0.7
  compress_keep_rounds: 2
  tool_snip_soft_tokens: 500
  tool_snip_hard_tokens: 2000
  journal_dir: "./logs/work"

db:
  path: "./data/emo.db"

log:
  level: "debug"
  format: "text"

personas:
  dir: "./personas"

websearch:
  enabled: true
  provider: tavily
  api_key_env: TAVILY_API_KEY
  max_results: 5
  timeout_sec: 30
  include_answer: false

bash:
  enabled: true
