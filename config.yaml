# EmoAgent Configuration

server:
  host: "127.0.0.1"
  port: 8080

chat:
  realtime_streaming: false
  turn_pipeline:
    shadow: false
    enabled: true
    memory_stages: true
    approval_stages: true
    rollout_percent: 100
    allow_personas: []
    allow_sessions: []
    deny_sessions: []
    journal:
      mode: sqlite
      jsonl_dir: ./logs/turns
      fail_closed: true
    idempotency:
      mode: sqlite
      duplicate_done: replay_summary
      duplicate_running: busy

plugins:
  enabled: false
  directories:
    - data/plugins
  builtin_enabled:
    - com.emoagent.plugins.turn-audit
    - com.emoagent.plugins.memory-context-debug
    - com.emoagent.plugins.outbound-guard
  rollout_percent: 0
  default_timeout_ms: 80
  max_timeout_ms: 1000
  fail_closed_hooks:
    - before_tool_call
    - before_memory_commit
  audit:
    enabled: true
    include_payload: false
  store:
    root_dir: data/plugins
    allow_dev_dirs: true
  runtime:
    process_enabled: true
    python_executable: python3
    startup_timeout_ms: 5000
    shutdown_timeout_ms: 3000
    idle_timeout_seconds: 600
    crash_backoff_initial_seconds: 5
    crash_backoff_max_seconds: 300
    max_stderr_bytes: 262144
    container_enabled: false
  installer:
    github_enabled: true
    require_signature: true
    trusted_publishers_path: config/plugin_publishers.yaml
    allow_unsigned_dev: true
  provider_gateway:
    enabled: true
    default_provider_id: ""
    default_model: ""
  admin:
    enabled: true

context:
  input_budget_tokens: 216000
  soft_compact_ratio: 0.75
  hard_compact_ratio: 0.92
  reserve_output_tokens: 16384
  keep_recent_user_turns: 6
  tool_result_soft_tokens: 1000
  tool_result_hard_tokens: 3000

llm_providers:
  - id: "moonshot"
    name: "Moonshot"
    preset_id: "moonshot"
    protocol: "openai_compatible"
    base_url: "https://api.moonshot.cn"
    api_key_env: "MOONSHOT_API_KEY"
    model_discovery: "openai_models"
    enabled: true
    capabilities: ["chat", "query_analysis"]
  - id: "deepseek"
    name: "DeepSeek"
    preset_id: "deepseek"
    protocol: "openai_compatible"
    base_url: "https://api.deepseek.com"
    api_key_env: "DEEPSEEK_API_KEY"
    model_discovery: "openai_models"
    enabled: true
    capabilities: ["chat", "query_analysis"]
  - id: "dashscope_embedding"
    name: "DashScope Embedding"
    preset_id: "qwen_dashscope_cn"
    protocol: "openai_compatible"
    base_url: "https://dashscope.aliyuncs.com/compatible-mode/v1"
    api_key_env: "DASHSCOPE_API_KEY"
    model_discovery: "manual"
    enabled: true
    capabilities: ["embedding"]
  - id: "dashscope_rerank"
    name: "DashScope Rerank"
    protocol: "dashscope_vl"
    base_url: "https://dashscope.aliyuncs.com/api/v1/services/rerank/text-rerank/text-rerank"
    api_key_env: "DASHSCOPE_API_KEY"
    model_discovery: "manual"
    enabled: true
    capabilities: ["rerank"]

agent_configs:
  - id: "default"
    name: "Default"
    persona_key: "default"
    emotion:
      main:
        provider_id: "moonshot"
        model: "kimi-k2.6"
        params:
          max_tokens: 8192
          temperature: 1
          stream: true
      summary:
        provider_id: "moonshot"
        model: "kimi-k2.6"
        params:
          max_tokens: 4096
          temperature: 0.1
          stream: false
    work:
      main:
        provider_id: "moonshot"
        model: "kimi-k2.6"
        params:
          max_tokens: 4096
          temperature: 0.3
      summary:
        provider_id: "moonshot"
        model: "kimi-k2.6"
        params:
          max_tokens: 2048
          temperature: 0.1
          stream: false
    context_overrides: {}

agent:
  active_config: "default"

agent_affect:
  enabled: false
  storage_enabled: true
  evaluator:
    mode: llm
    provider_id: deepseek
    model: deepseek-v4-flash
    thinking_enabled: true
    reasoning_effort: medium
    temperature: 0.2
    timeout_ms: 30000
    max_output_tokens: 4096
    store_hidden_thinking: false
  context:
    mode: raw_window
    raw_keep_last_requests: 20
    raw_keep_last_tokens: 12000
    include_previous_evaluations: true
    previous_evaluation_keep_last: 30
    summary_enabled: false
    store_raw_inputs: true
    store_prompt_snapshot: false
  externalization:
    attachment:
      enabled: true
      default_style: gentle_explicit
      max_visible_intensity: 0.65
    frustration:
      enabled: false
  plugin_api:
    enabled: true
    plugin_safe_include_reason: true
    plugin_safe_include_raw_text: false
    ordinary_plugins_can_commit: true
    ordinary_plugins_can_write_delta: true
    trusted_plugins_can_write_target: true
  limits:
    plugin_delta_multiplier: 1
    per_request_delta:
      valence: 0.15
      arousal: 0.18
      dominance: 0.12
      energy: 0.12
      warmth: 0.15
      concern: 0.18
      curiosity: 0.18
      playfulness: 0.15
      attachment: 0.08
      frustration: 0.08
      uncertainty: 0.12
    absolute:
      attachment_max: 0.75
      frustration_max: 0.35
  prompt:
    include_mood_block: true
    include_reason: true
    include_expression_guidance: false
    include_numeric_values: true

memory:
  enabled: true
  config_path: "./config/memorycore.yaml"
  manual_rules_path: "./config/memory_manual_rules.yaml"
  retrieval:
    enabled: true
    inject_prompt: true
    use_fts: true
    use_mirror: true
    final_memory_count: 4
    context_budget_tokens: 2048
    fail_open: true
    pipeline_debug: true

  extraction:
    enabled: true
    mode: apply
    trigger_on_finalize_segment: true
    trigger_on_manual_pin: true
    manual_pin_mode: apply
    limit: 50
    timezone: Asia/Shanghai
    allow_inference: true
    allow_sensitive_extraction: true
    max_facts: 12
    max_links: 20

    async:
      enabled: true
      worker_enabled: true
      worker_concurrency: 1
      queue_claim_ttl_seconds: 300
      max_attempts: 3
      retry_base_delay_seconds: 30
      retry_max_delay_seconds: 900

    idle:
      enabled: true
      idle_after_seconds: 900
      sweep_interval_seconds: 60
      min_episode_count: 2
      max_segments_per_sweep: 20
      include_finalized_segments: true
      include_active_segments: true

    manual:
      enabled: true
      mode: apply
      allow_force: true
      allow_segment_selection: true

    mirror_sync:
      after_apply: true
      periodic_enabled: true
      interval_seconds: 60
      limit: 100
      fail_extraction_on_sync_error: false

    semantic_dedup:
      enabled: true
      shadow: false
      enforce: true
      candidate_limit: 12
      threshold_profile: default_v0

    raw_log:
      enabled: true
      directory: ./logs/memory_extraction_raw

    repair_enabled: true
    audit_enabled: true

  natural_memory:
    enabled: true
    scheduler_enabled: true
    tick_interval_seconds: 60
    local_time: "03:30"
    timezone: ""
    run_missed_on_start: false
    mirror_sync_after_run: true
    mirror_sync_limit: 100
    fail_on_sync_error: false
    manual:
      enabled: true
      allow_dry_run: true
      allow_force: true
      mark_sleep_cycle_by_default: false

  sidecar:
    enabled: true
    managed: true
    adapter: trivium
    host: "127.0.0.1"
    port: 8765
    url: "http://127.0.0.1:8765"
    working_dir: "../EmoAgent-MemoryCore/sidecar"
    config_path: "./data/runtime/sidecar.generated.toml"
    startup_timeout_ms: 15000
    shutdown_timeout_ms: 5000
    fail_open: true
    log_path: "./logs/sidecar.log"
    trivium_dir: "./data/trivium"
    embedding_cache_path: "./data/embedding_cache.sqlite3"

  provider_bindings:
    prefilter:
      enabled: true
      provider_id: "deepseek"
      model: "deepseek-v4-flash"
    extraction:
      enabled: true
      provider_id: "deepseek"
      model: "deepseek-v4-flash"
    extraction_repair:
      enabled: true
      provider_id: "deepseek"
      model: "deepseek-v4-flash"
    query_analysis:
      enabled: true
      provider_id: "deepseek"
      model: "deepseek-v4-flash"
    curation:
      enabled: true
      provider_id: "deepseek"
      model: "deepseek-v4-flash"
    embedding:
      enabled: true
      provider_id: "dashscope_embedding"
      model: "text-embedding-v4"
      dimensions: 1024
    rerank:
      enabled: true
      provider_id: "dashscope_rerank"
      model: "qwen3-vl-rerank"
      top_k: 16


work:
  max_tool_rounds: 24
  max_input_tokens: 100000
  compress_soft_ratio: 0.7
  compress_keep_rounds: 2
  tool_snip_soft_tokens: 500
  tool_snip_hard_tokens: 2000
  journal_dir: "./logs/work"

db:
  path: "./data/emo.db"

log:
  level: "debug"
  format: "text"

personas:
  dir: "./personas"

websearch:
  enabled: true
  provider: tavily
  api_key_env: TAVILY_API_KEY
  max_results: 5
  timeout_sec: 30
  include_answer: false

bash:
  enabled: true
