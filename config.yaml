# EmoAgent Configuration

server:
  host: "127.0.0.1"
  port: 8080

llm:

  # Anthropic example:
  # provider: "anthropic"
  # base_url: "https://api.anthropic.com"
  # model: "claude-sonnet-4-20250514"
  # max_completion_tokens TODO部分模型需要-暂未实现
  # thinking TODO部分模型可选
  # stream TODO流式传输-暂未实现

  provider: "openai"
  base_url: "https://api.moonshot.cn"
  model: "kimi-k2.5"
  summary_model: "kimi-k2.5"
  max_tokens: 4096
  temperature: 1
  api_key_env: "OPENAI_API_KEY"

llm_profiles:
  - name: "default"
    provider: "openai"
    base_url: "https://api.openai.com"
    model: "gpt-4o"
    summary_model: "gpt-4o-mini"
    max_tokens: 4096
    temperature: 0.7
    api_key_env: "OPENAI_API_KEY"
  - name: "analysis"
    provider: "anthropic"
    base_url: "https://api.anthropic.com"
    model: "claude-sonnet-4-20250514"
    max_tokens: 4096
    temperature: 0.3
    api_key_env: "ANTHROPIC_API_KEY"

db:
  path: "./data/emo.db"

log:
  level: "info"
  format: "text"

personas:
  dir: "./personas"
  default: "default"

websearch:
  enabled: true
  provider: tavily
  api_key_env: TAVILY_API_KEY
  max_results: 5
  timeout_sec: 30
  include_answer: false
