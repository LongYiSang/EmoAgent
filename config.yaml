# EmoAgent Configuration

server:
  host: "127.0.0.1"         # server bind host
  port: 8080                # server bind port

llm:
  # OpenAI example:
  # base_url: "https://api.openai.com"
  # model: "gpt-4o"
  # Anthropic example:
  # provider: "anthropic"
  # base_url: "https://api.anthropic.com"
  # model: "claude-sonnet-4-20250514"
  # max_completion_tokens TODO部分模型需要-暂未实现
  # thinking TODO部分模型可选-暂未实现
  # stream TODO流式传输-暂未实现
  provider: "openai"        # "openai" | "anthropic"
  base_url: "https://api.moonshot.cn"
  model: "kimi-k2.5"        # main conversation model
  summary_model: "kimi-k2.5" # reserved for future summarization/compression flow
  max_tokens: 4096
  temperature: 1

db:
  path: "./data/emo.db"     # SQLite file path

log:
  level: "info"             # "debug" | "info" | "warn" | "error"
  format: "text"            # "text" | "json"

personas:
  dir: "./personas"         # hot-reload persona directory
  default: "default"        # default persona file name, e.g. personas/default.yaml
