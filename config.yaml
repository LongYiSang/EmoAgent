# EmoAgent Configuration

server:
  host: "127.0.0.1"
  port: 8080

llm:

  # Anthropic example:
  # provider: "anthropic"
  # base_url: "https://api.anthropic.com"
  # model: "claude-sonnet-4-20250514"
  # max_completion_tokens TODO部分模型需要-暂未实现
  # thinking TODO部分模型可选
  # stream TODO流式传输-暂未实现

  provider: "openai"
  base_url: "https://api.moonshot.cn"
  model: "kimi-k2.5"
  summary_model: "kimi-k2.5"
  max_tokens: 8192
  temperature: 1
  api_key_env: "OPENAI_API_KEY"

context:
  input_budget_tokens: 216000
  soft_compact_ratio: 0.75
  hard_compact_ratio: 0.92
  reserve_output_tokens: 16384
  keep_recent_user_turns: 6
  tool_result_soft_tokens: 1000
  tool_result_hard_tokens: 3000

work:
  profile: "work"
  max_tool_rounds: 24
  max_input_tokens: 100000
  journal_dir: "./logs/work"

llm_profiles:
  - name: "default"
    provider: "openai"
    base_url: "https://api.openai.com"
    model: "gpt-4o"
    summary_model: "gpt-4o-mini"
    max_tokens: 4096
    temperature: 0.7
    api_key_env: "OPENAI_API_KEY"
  - name: "analysis"
    provider: "anthropic"
    base_url: "https://api.anthropic.com"
    model: "claude-sonnet-4-20250514"
    max_tokens: 4096
    temperature: 0.3
    api_key_env: "ANTHROPIC_API_KEY"
  - name: "work"
    provider: "openai"
    base_url: "https://api.deepseek.com"
    model: "deepseek-reasoner"
    max_tokens: 4096
    temperature: 0.3
    api_key_env: "OPENAI_API_KEY_2"

db:
  path: "./data/emo.db"

log:
  level: "debug"
  format: "text"

personas:
  dir: "./personas"
  default: "default"

websearch:
  enabled: true
  provider: tavily
  api_key_env: TAVILY_API_KEY
  max_results: 5
  timeout_sec: 30
  include_answer: false

bash:
  enabled: true